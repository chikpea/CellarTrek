function openAccountModal(){
  S.showAccount = true;
  S.accountTab = "profile";
  S.accountSaved = false;
  S.accountDraft = {
    name: S.user?.name || "",
    bio: S.user?.bio || "",
    city: S.user?.city || "",
    favoriteWines: (S.user?.favorite_wines || []).join(", "),
    favoriteSpots: (S.user?.favorite_spots || []).join(", "),
    avatarEmoji: S.user?.avatar_emoji || "🍷",
    themeMode: S.user?.theme_mode || "dark",
    themeAccent: S.user?.theme_accent || "",
    profilePublic: S.user?.profile_public !== false,
  };
  render();
}

function closeAccountModal(){
  S.showAccount = false;
  render();
}

async function saveAccountProfile(){
  S.accountSaving = true; render();
  try{
    const d = S.accountDraft;
    const result = await apiRequest("/api/user/profile", {
      method:"PUT",
      body: JSON.stringify({
        name: d.name,
        bio: d.bio,
        city: d.city,
        favoriteWines: d.favoriteWines.split(",").map(s=>s.trim()).filter(Boolean),
        favoriteSpots: d.favoriteSpots.split(",").map(s=>s.trim()).filter(Boolean),
        avatarEmoji: d.avatarEmoji,
        themeMode: d.themeMode,
        themeAccent: d.themeAccent || null,
        profilePublic: d.profilePublic,
      })
    });
    S.user = {
      ...S.user,
      name: result.name, bio: result.bio, city: result.city,
      favorite_wines: result.favorite_wines, favorite_spots: result.favorite_spots,
      avatar_emoji: result.avatar_emoji, theme_mode: result.theme_mode,
      theme_accent: result.theme_accent, profile_public: result.profile_public,
    };
    persistUserProfile();
    S.accountSaving = false;
    S.accountSaved = true;
    render();
    setTimeout(()=>{ S.accountSaved=false; render(); }, 2000);
  } catch(e){
    S.accountSaving = false;
    alert("Could not save profile: " + e.message);
    render();
  }
}

async function loadPublicProfile(userId){
  S.publicProfileLoading = true; render();
  try{
    const res = await fetch("/api/users/"+userId+"/public");
    const data = await res.json();
    if(!res.ok){ alert(data.error||"Could not load profile."); S.publicProfileLoading=false; render(); return; }
    S.publicProfile = data;
  } catch(e){
    alert("Could not load profile.");
  }
  S.publicProfileLoading = false;
  render();
}

/* ===========================================================================
   WINE COMPARISON MODULE  (consumer / blind / venue auto-scan + order capture)
   Integrated into CellarTrek: reads S.wines, derives numeric axes from the
   existing word fields (body/finish/grapes), uses callAI() when available and
   an attribute fallback otherwise. Mirrors the standalone demo.
   =========================================================================== */

// Derive 0-5 structural axes from CellarTrek's existing descriptive fields.
const CT_BODY_MAP={"very light":1,"light":1,"light-medium":2,"medium":3,"medium-full":4,"full":4,"very full":5,"full-bodied":4};
function ctBody(w){ const b=(w.body||"").toLowerCase(); if(CT_BODY_MAP[b]!=null)return CT_BODY_MAP[b]; return 3; }
function ctType(w){
  const g=(w.grapes||[]).join(" ").toLowerCase();
  if(/chardonnay|sauvignon|riesling|chenin|pinot gris|grigio|albari|viognier|gewurz|semillon/.test(g)) return "White";
  if(/rosé|rose/.test(g)) return "Rosé";
  if(/champagne|sparkl|cava|prosecco/.test((w.region||"").toLowerCase()+g)) return "Sparkling";
  return "Red";
}
// Estimate acidity/tannin/sweetness from grape + type heuristics (offline only).
function ctAxes(w){
  const t=ctType(w); const g=(w.grapes||[]).join(" ").toLowerCase(); const r=(w.region||"").toLowerCase();
  let acidity=3,tannin=t==="White"?0:3,sweetness=1;
  if(/nebbiolo|sangiovese|barbera|gamay/.test(g))acidity=5;
  if(/pinot noir|cabernet franc/.test(g))acidity=4;
  if(/grenache|syrah|mourv|zinfandel|malbec/.test(g))acidity=3;
  if(/nebbiolo|cabernet sauvignon|tannat|sangiovese/.test(g))tannin=Math.max(tannin,4);
  if(/grenache|gamay|pinot/.test(g))tannin=Math.min(tannin,3);
  if(t==="White"){acidity=/riesling|sauvignon|chenin|chablis|albari/.test(g+r)?5:4;}
  if(/maury|port|sauternes|tokaji|ice wine|demi-sec|moelleux/.test(g+r))sweetness=3;
  if(/riesling/.test(g)&&/mosel|kabinett|spat/.test(r))sweetness=2;
  return {body:ctBody(w),acidity,tannin,sweetness,type:t};
}
function ctWineForCompare(w){
  const ax=ctAxes(w);
  return {
    id:w.id, name:w.name, vintage:w.vintage, region:w.region,
    grape:(w.grapes||[]).join(", "), type:ax.type,
    body:ax.body, acidity:ax.acidity, tannin:ax.tannin, sweetness:ax.sweetness,
    price:w.price!=null?w.price:null, score:w.rating!=null?w.rating:null,
    window:(w.drinkWindowFrom&&w.drinkWindowTo)?`${w.drinkWindowFrom}–${w.drinkWindowTo}`:(w.finish||""),
    src:w.venueId?"venue":(w.mode||"cellar")
  };
}
function ctEstimateTyped(name){
  // offline: no external DB; flag as unknown so UI suggests AI
  return { name, src:"typed", region:"—", grape:"—", type:"Red",
    body:3,acidity:3,tannin:3,sweetness:1,price:null,score:null,unknown:true };
}

const CMP_AXES=[["body",1],["acidity",1],["tannin",1],["sweetness",.7]];
function cmpSim(a,b){
  let tot=0,w=0;
  for(const [k,wt] of CMP_AXES){ if(a[k]==null||b[k]==null)continue; tot+=(1-Math.abs(a[k]-b[k])/5)*wt; w+=wt; }
  let s=w?tot/w:.5;
  if(a.grape&&b.grape&&a.grape===b.grape)s=s*.8+.2;
  s=(a.type&&b.type&&a.type===b.type)?Math.min(1,s+.05):s*.85;
  if(a.region&&b.region&&a.region===b.region)s=Math.min(1,s+.05);
  return Math.round(s*100);
}
function cmpAxisName(k){return ({body:"body",acidity:"acidity",tannin:"tannin/structure",sweetness:"sweetness"})[k];}
function cmpClosest(a,b){let best="body",bd=9;CMP_AXES.forEach(([k])=>{if(a[k]!=null&&b[k]!=null){const d=Math.abs(a[k]-b[k]);if(d<bd){bd=d;best=k;}}});return cmpAxisName(best);}
function cmpFarthest(a,b){let w="body",wd=-1;CMP_AXES.forEach(([k])=>{if(a[k]!=null&&b[k]!=null){const d=Math.abs(a[k]-b[k]);if(d>wd){wd=d;w=k;}}});return cmpAxisName(w);}

// ---- data sources for the slots ----
function cmpPool(){
  const cellar=S.wines.filter(w=>w.mode==="cellar"&&!w.venueId).slice(0,8).map(ctWineForCompare);
  const consumed=S.wines.filter(w=>w.mode==="consumed"&&!w.venueId).slice(0,8).map(ctWineForCompare);
  const av=S.joinedVenues&&S.joinedVenues.length?S.joinedVenues.find(v=>v.id===S.activeVenueId)||S.joinedVenues[0]:null;
  const venue=av?S.wines.filter(w=>w.venueId===av.id).map(ctWineForCompare):[];
  return {cellar,consumed,venue};
}
function cmpResolve(slot){
  if(slot.wine)return slot.wine;
  const q=(slot.query||"").trim(); if(!q)return null;
  return ctEstimateTyped(q);
}

// ---- attribute (offline) analysis ----
function cmpLocal(wines,mode){
  const cand=wines[0]; let best=0,bestRef=null;
  for(let i=1;i<wines.length;i++){const s=cmpSim(cand,wines[i]);if(s>best){best=s;bestRef=wines[i];}}
  const anyUnknown=wines.some(w=>w.unknown);
  let verdict,badge,text;
  if(anyUnknown){
    // Honest: we can't truly score an unrecognised typed wine offline.
    verdict="maybe"; badge="Need AI for this";
    text=`One of these wines isn't in your collection, so offline I can't read its profile precisely — the attribute match would be guesswork. <b>Enable the AI sommelier</b> (available on IONOS) for an accurate comparison of <b>${cand.name}</b>.`;
    return {similarity:null,verdict,badge,text,source:"attributes",wines,suppressSim:true};
  }
  if(mode==="blind"){
    const ranked=[...wines].filter(w=>w.score).sort((a,b)=>(b.score)-(a.score));
    const pick=ranked[0]||wines[0]; verdict="try"; badge="Best pick";
    text=`These are ${best>70?"closely related":"fairly different"} styles. On balance <b>${pick.name}</b> looks like the standout. The ${best}% overlap means if you enjoy one you'll likely enjoy the other.`;
  } else {
    if(best>=72){verdict="try";badge="Worth trying";text=`<b>${cand.name}</b> is <b>${best}%</b> similar to <b>${bestRef.name}</b>, already in your world — same ${cmpClosest(cand,bestRef)}. If you enjoyed that, this is a rewarding bet.`;}
    else if(best>=50){verdict="maybe";badge="A stretch";text=`<b>${cand.name}</b> shares some character with <b>${bestRef.name}</b> (<b>${best}%</b>) but differs on ${cmpFarthest(cand,bestRef)}. Try it if you're exploring beyond your usual.`;}
    else{verdict="skip";badge="Different direction";text=`At <b>${best}%</b>, <b>${cand.name}</b> sits outside what you've enjoyed — notably ${cmpFarthest(cand,bestRef)}. Worth it only to branch out.`;}
  }
  return {similarity:best,verdict,badge,text,source:"attributes",wines};
}

// ---- AI analysis via callAI() ----
async function cmpAI(wines,mode){
  const modePrompt={
    consumer:"The first wine is a CANDIDATE the user is considering. The rest are wines they OWN or have ENJOYED. Decide if they should try the candidate.",
    blind:"All wines are ones the user has NOT tried and is choosing between. Recommend which to buy and note how alike they are."
  }[mode];
  const sys="You are a master sommelier. Compare wines and return ONLY valid JSON, no markdown. Shape: {\"similarity\":<0-100 int>,\"verdict\":\"try\"|\"maybe\"|\"skip\",\"badge\":\"<=3 words\",\"text\":\"2-3 sentence recommendation, may use <b> tags\",\"attributes\":[{\"name\":\"\",\"region\":\"\",\"grape\":\"\",\"type\":\"\",\"body\":0,\"acidity\":0,\"tannin\":0,\"sweetness\":0,\"price\":null,\"window\":\"\"}]}";
  const user=modePrompt+"\n\nWines:\n"+wines.map((w,i)=>`${i+1}. ${w.name}${w.vintage?" "+w.vintage:""}`).join("\n");
  const raw=await callAI(user,sys,1024); const p=JSON.parse(raw);
  if(p.attributes)p.attributes.forEach((a,i)=>{if(wines[i])Object.assign(wines[i],{
    region:wines[i].region&&wines[i].region!=="—"?wines[i].region:a.region,
    grape:wines[i].grape&&wines[i].grape!=="—"?wines[i].grape:a.grape,
    type:wines[i].type||a.type,body:wines[i].body??a.body,acidity:wines[i].acidity??a.acidity,
    tannin:wines[i].tannin??a.tannin,sweetness:wines[i].sweetness??a.sweetness,
    price:wines[i].price??a.price,window:wines[i].window||a.window});});
  p.source="ai"; p.wines=wines; return p;
}

// ---- venue auto-scan ----
function cmpValuePitch(req,m){
  const bits=[];
  if(req.price!=null&&m.price!=null){const d=req.price-m.price; if(d>=8)bits.push(`<b>$${m.price}</b> vs ~$${req.price} — about $${d} less`); else if(d<=-8)bits.push(`a step up at <b>$${m.price}</b>`); else bits.push(`comparably priced at <b>$${m.price}</b>`);}
  else if(m.price!=null)bits.push(`<b>$${m.price}</b>`);
  if(m.score){if(req.score&&m.score>=req.score-1)bits.push(`rated <b>${m.score}</b> — on par or better`);else bits.push(`critic score <b>${m.score}</b>`);}
  bits.push("<b>in stock now</b>"); return bits;
}
// Fetch the venue's real sellable wine catalogue (shop_items, category=wine).
// Returns comparison-shaped objects that CARRY itemId for real ordering.
async function cmpFetchVenueCatalogue(){
  const av=S.joinedVenues&&S.joinedVenues.length?(S.joinedVenues.find(v=>v.id===S.activeVenueId)||S.joinedVenues[0]):null;
  if(!av)return [];
  try{
    const r=await fetch(`/api/venue/${av.id}/catalogue`,{headers:{"Authorization":"Bearer "+(S.user&&S.user.token)}});
    if(!r.ok)return [];
    const d=await r.json();
    return (d.items||[]).map(it=>({
      itemId:it.id, name:it.title, price:(it.price!=null?Number(it.price):null),
      priceLabel:it.price_label||null, desc:it.description||"", tags:it.tags||[],
      region:"", grape:"", type:"", body:null, acidity:null, tannin:null, sweetness:null, score:null,
      src:"venue"
    }));
  }catch(e){ return []; }
}
// Offline fallback for venue mode: shop_items have no structured wine axes,
// so we degrade to honest text/keyword overlap on title + tags + description.
function cmpTextScore(req,m){
  const q=((req.name||"")+" ").toLowerCase();
  const hay=((m.name||"")+" "+(m.tags||[]).join(" ")+" "+(m.desc||"")).toLowerCase();
  const toks=q.split(/[^a-z0-9]+/).filter(w=>w.length>3);
  if(!toks.length)return 0;
  let hit=0; toks.forEach(tk=>{ if(hay.includes(tk))hit++; });
  return Math.round((hit/toks.length)*100);
}
function cmpVenueLocal(req,cat){
  const ranked=cat.map(w=>({w,sim:cmpTextScore(req,w)})).sort((a,b)=>b.sim-a.sim);
  const top=ranked[0]; const alts=ranked.slice(1,3).map(r=>r.w);
  if(!top)return {error:"This venue has no wines listed to compare against yet."};
  const pitch=cmpValuePitch(req,top.w);
  const text=`Offline, I can only match <b>${req.name}</b> on listing text, so treat this as a rough steer: <b>${top.w.name}</b> looks like the nearest of what the venue carries. It's ${pitch.join(", ")}. <b>Enable the AI sommelier</b> for a true style match.`;
  return {similarity:top.sim,best:top.w,alternatives:alts,badge:"Closest by name",pitch,text,source:"attributes",requested:req,rough:true};
}
async function cmpVenueAI(req,cat){
  const sys="You are a master sommelier helping a venue. A guest requested a wine the venue does NOT stock. From ONLY the venue's list, pick the single most competitive substitute and up to 2 alternates. Be honest about closeness; favour comparable quality and good value in stock. Return ONLY valid JSON. Shape: {\"similarity\":0-100,\"bestName\":\"<exact name from list>\",\"altNames\":[\"\"],\"badge\":\"<=3 words\",\"text\":\"2-3 honest sentences, may use <b>\"}";
  const user=`Guest requested: ${req.name}${req.vintage?" "+req.vintage:""}\n\nVenue's list (name | price | notes):\n`+cat.map(w=>`- ${w.name} | ${w.price!=null?"$"+w.price:(w.priceLabel||"NA")} | ${(w.desc||"").slice(0,80)}`).join("\n");
  const raw=await callAI(user,sys,800); const p=JSON.parse(raw);
  const best=cat.find(w=>w.name===p.bestName)||cat[0];
  const alts=(p.altNames||[]).map(n=>cat.find(w=>w.name===n)).filter(Boolean);
  return {similarity:p.similarity,best,alternatives:alts,badge:p.badge||"Recommended",pitch:cmpValuePitch(req,best),text:p.text,source:"ai",requested:req};
}

// ---- run ----
async function cmpRun(){
  S.cmpResult=null; S.cmpLoading=true; render();
  try{
    if(S.cmpMode==="venue"){
      const reqSlot=S.cmpSlots.find(s=>s.wine||(s.query&&s.query.trim()));
      const req=cmpResolve(reqSlot);
      const cat=await cmpFetchVenueCatalogue();
      if(!cat.length){S.cmpResult={error:"No venue wine catalogue available. Join a venue with a wine list to use this mode."};}
      else{ let r=null; if(CMP_AI_OK){try{r=await cmpVenueAI(req,cat);}catch(e){r=null;}} if(!r)r=cmpVenueLocal(req,cat); S.cmpResult=r; }
    } else {
      const wines=S.cmpSlots.filter(s=>s.wine||(s.query&&s.query.trim())).map(cmpResolve);
      if(wines.length<2){S.cmpLoading=false;render();return;}
      let r=null; if(CMP_AI_OK){try{r=await cmpAI(wines,S.cmpMode);}catch(e){r=null;}} if(!r)r=cmpLocal(wines,S.cmpMode);
      S.cmpResult=r;
    }
  }catch(e){ S.cmpResult={error:"Comparison failed. Please try again."}; }
  S.cmpLoading=false; render();
}

// AI availability flag. Defaults on; falls back automatically if /api/anthropic
// fails (e.g. residential LYSITHEA). Override via WL_AI_ENABLED if defined.
let CMP_AI_OK = (typeof WL_AI_ENABLED!=="undefined")?!!WL_AI_ENABLED:true;

// ---- order capture (venue) — items carry itemId from shop_items ----
function cmpAddOrder(name){
  const r=S.cmpResult; if(!r)return;
  const w=[r.best,...(r.alternatives||[])].find(x=>x&&x.name===name); if(!w)return;
  const ex=S.cmpOrder.find(o=>o.name===w.name); if(ex)ex.qty++; else S.cmpOrder.push({itemId:w.itemId,name:w.name,price:w.price||0,qty:1});
  render();
}
function cmpOrderQty(name,d){const o=S.cmpOrder.find(x=>x.name===name);if(!o)return;o.qty+=d;if(o.qty<=0)S.cmpOrder=S.cmpOrder.filter(x=>x.name!==name);render();}
async function cmpSendOrder(){
  // Place each line via the real shop order endpoint (handles commission, stock, seller routing)
  const lines=S.cmpOrder.filter(o=>o.itemId);
  S.cmpLoading=true; render();
  let ok=0,fail=0;
  for(const o of lines){
    try{
      const r=await fetch("/api/shop/orders",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+(S.user&&S.user.token)},
        body:JSON.stringify({itemId:o.itemId, qty:o.qty})});
      if(r.ok)ok++; else fail++;
    }catch(e){ fail++; }
  }
  S.cmpLoading=false;
  S.cmpOrder=[];
  S.cmpResult=Object.assign({},S.cmpResult,{_sent:true,_sentMsg:fail?`Placed ${ok} item(s); ${fail} failed.`:`Order placed — ${ok} item(s) sent to the venue.`});
  render();
}

/* ---- render: Compare tab ---- */
function renderCompareTab(){
  const modes=[["consumer","🍷","Against my wines"],["blind","⚖️","Help me choose"],["venue","🏛","Venue: closest match"]];
  const pool=cmpPool();
  const modeCards=modes.map(([m,ic,lbl])=>`
    <button class="cmp-mode${S.cmpMode===m?" on":""}" data-cmpmode="${m}">
      <span class="cmp-mi">${ic}</span><span class="cmp-ml">${lbl}</span>
    </button>`).join("");

  // slots
  const isVenue=S.cmpMode==="venue";
  const slotEls=S.cmpSlots.map((s,i)=>{
    const isRef=s.role==="ref";
    const label=isVenue?"Guest's request":(s.role==="ref"?(S.cmpMode==="consumer"?"From my wines":"Option"):(S.cmpMode==="consumer"?"Wine I'm considering":"Option"));
    let inner=`<div class="cmp-slabel">${label}${S.cmpSlots.length>2?`<button class="cmp-x" data-cmprm="${i}">✕</button>`:""}</div>`;
    if(s.wine){
      inner+=`<div class="cmp-filled"><span class="cmp-wn">${s.wine.name}</span><span class="cmp-wm">${s.wine.vintage?s.wine.vintage+" · ":""}${s.wine.region||""}${s.wine.grape&&s.wine.grape!=="—"?" · "+s.wine.grape:""}</span></div><button class="cmp-chip" data-cmpclear="${i}">change</button>`;
    } else {
      inner+=`<input class="cmp-name inp" placeholder="Type a wine name…" value="${(s.query||"").replace(/"/g,"&quot;")}" data-cmpq="${i}">`;
      const chips=[];
      if(!isVenue && isRef){ pool.cellar.forEach(w=>chips.push([w,"cellar"])); pool.consumed.forEach(w=>chips.push([w,"consumed"])); }
      if(chips.length)inner+=`<div class="cmp-picker">`+chips.map(([w,src])=>`<span class="cmp-chip" data-cmppick="${i}|${src}|${encodeURIComponent(w.name)}">${w.name}<span class="cmp-src">${src}</span></span>`).join("")+`</div>`;
      else inner+=`<div class="cmp-hint">${isVenue?"Enter the wine the guest asked for.":"Type a wine name."}</div>`;
    }
    return `<div class="cmp-slot ${isRef?"ref":"cand"}">${inner}</div>`;
  }).join("");

  const addSlot=(!isVenue&&S.cmpSlots.length<3)?`<button class="cmp-add" id="cmp-add">＋ Add a third wine</button>`:"";
  const venueNote=isVenue?`<div class="cmp-add" style="cursor:default;border-style:solid">🔎 We'll scan your venue's wine list and surface the most competitive in-stock match</div>`:"";

  const result = S.cmpLoading
    ? `<div class="cmp-loading"><span class="cmp-spin"></span>${CMP_AI_OK?"Asking the sommelier…":"Matching on attributes…"}</div>`
    : (S.cmpResult? (isVenue?renderCmpVenueResult():renderCmpResult()) : "");

  return `
  <div class="cmp-wrap">
    <div class="cmp-head"><h2 class="serif">Compare wines</h2><span class="cmp-env ${CMP_AI_OK?"":"off"}">${CMP_AI_OK?"AI sommelier":"Attribute mode"}</span></div>
    <p class="cmp-sub">Line up two or three wines — a bottle you're considering against ones you own or have tasted, weigh options you've never tried, or find a venue's closest match to a request.</p>
    <div class="cmp-modes">${modeCards}</div>
    <div class="cmp-slots">${slotEls}${addSlot}${venueNote}</div>
    <div class="cmp-actions"><button class="btn-g" id="cmp-go">${isVenue?"Find our best match":"Compare wines"}</button><button class="cmp-reset" id="cmp-reset">Reset</button></div>
    ${result}
  </div>`;
}
function renderCmpResult(){
  const a=S.cmpResult; if(a.error)return `<div class="cmp-verdict"><div class="cmp-vtext">${a.error}</div></div>`;
  const wines=a.wines||[]; const vc=a.verdict||"maybe";
  const rows=[["Region","region"],["Grape","grape"],["Type","type"],["Body","body",1],["Acidity","acidity",1],["Tannin","tannin",1],["Sweetness","sweetness",1],["Score","score"],["Window","window"]];
  const sw={body:["—","Very light","Light","Medium","Full","Very full"],acidity:["—","Low","Soft","Medium","Crisp","Racy"],tannin:["None","Soft","Light","Medium","Firm","Grippy"],sweetness:["Bone dry","Dry","Off-dry","Medium","Sweet","Lush"]};
  const dot=(a0,b0,k)=>{if(a0[k]==null||b0[k]==null)return "";if(typeof a0[k]==="number"){const d=Math.abs(a0[k]-b0[k]);return `<span class="cmp-dot ${d===0?"same":d<=1?"close":"diff"}"></span>`;}return `<span class="cmp-dot ${a0[k]===b0[k]?"same":"diff"}"></span>`;};
  const thead=`<tr><th>Attribute</th>${wines.map((w,i)=>`<th><span class="cmp-th-n">${w.name}</span><span class="cmp-th-r ${i===0?"cand":"ref"}">${i===0?(S.cmpMode==="blind"?"OPTION A":"CANDIDATE"):(S.cmpMode==="blind"?"OPTION":"YOUR WINE")}</span></th>`).join("")}</tr>`;
  const tbody=rows.map(([lbl,k,bar])=>{
    const tds=wines.map((w,wi)=>{
      let v=w[k]; if(v==null||v==="")v="—";
      if(bar&&typeof w[k]==="number"){const d=wi>0?dot(wines[0],w,k):"";return `<td><span class="cmp-val">${(sw[k]&&sw[k][w[k]]!=null)?sw[k][w[k]]:w[k]}${d}</span><div class="cmp-bar"><i style="width:${(w[k]/5)*100}%"></i></div></td>`;}
      if(k==="score")return `<td><span class="cmp-val">${w.score!=null?w.score:"—"}</span></td>`;
      const d=(wi>0&&(k==="grape"||k==="type"||k==="region"))?dot(wines[0],w,k):"";
      return `<td><span class="cmp-val">${v}</span>${d}</td>`;
    }).join("");
    return `<tr><td class="cmp-attr">${lbl}</td>${tds}</tr>`;
  }).join("");
  return `
    <div class="cmp-verdict ${vc}">
      <div class="cmp-vhead"><span class="cmp-badge ${vc}">${a.badge||"Result"}</span>${a.suppressSim?"":`<span class="cmp-sim"><b>${a.similarity}%</b> similar</span>`}<span class="cmp-aitag ${a.source==="ai"?"":"fb"}">${a.source==="ai"?"AI sommelier":"attribute match"}</span></div>
      <div class="cmp-vtext">${a.text}</div>
    </div>
    <div class="cmp-grid"><div class="cmp-gt">Side by side</div><table class="cmp-table"><thead>${thead}</thead><tbody>${tbody}</tbody></table></div>`;
}
function renderCmpVenueResult(){
  const a=S.cmpResult; if(a.error)return `<div class="cmp-verdict"><div class="cmp-vtext">${a.error}</div></div>`;
  const req=a.requested, best=a.best;
  const altMeta=w=>[w.priceLabel||(w.price!=null?"$"+w.price:""), (w.desc||"").slice(0,60)].filter(Boolean).join(" · ");
  const alts=(a.alternatives||[]).map(w=>`<div class="cmp-alt"><div><span class="cmp-an">${w.name}</span><span class="cmp-am">${altMeta(w)}</span></div><div class="cmp-altr"><button class="cmp-ord sm" data-cmporder="${encodeURIComponent(w.name)}">+ Order</button></div></div>`).join("");
  const order=S.cmpOrder.length?`<div class="cmp-tray"><div class="cmp-th2"><span>Order</span><span class="cmp-tot">$${S.cmpOrder.reduce((t,o)=>t+o.price*o.qty,0)}</span></div>${S.cmpOrder.map(o=>`<div class="cmp-line"><span class="cmp-ln">${o.name}</span><span class="cmp-q"><button data-cmpqty="${encodeURIComponent(o.name)}|-1">−</button>${o.qty}<button data-cmpqty="${encodeURIComponent(o.name)}|1">+</button></span><span class="cmp-lp">$${o.price*o.qty}</span></div>`).join("")}<button class="cmp-send" id="cmp-send">Place order →</button></div>`:(a._sent?`<div class="cmp-sent">✓ ${a._sentMsg||"Order placed."}</div>`:"");
  const simHtml=(a.similarity!=null&&!a.rough)?`<span class="cmp-sim"><b>${a.similarity}%</b> match</span>`:(a.rough?`<span class="cmp-sim" style="color:var(--cream-faint)">rough</span>`:"");

function renderStats(){
  const{wines}=S;
  const cl=wines.filter(w=>w.mode==="cellar").length;
  const co=wines.filter(w=>w.mode==="consumed").length;
  const avg=wines.length?Math.round(wines.reduce((a,w)=>a+w.rating,0)/wines.length):0;
  const tr=wines.filter(w=>w.tradeable).length;
  return`<div class="stats-bar" style="display:flex;background:rgba(42,18,22,.92);border-bottom:1px solid var(--border)">
    ${[["🍾",t("cellar"),cl],["✓",t("consumed"),co],["⭐",t("avgScore"),avg],["🔄",t("tradeable"),tr]].map(([ic,lb,v])=>`
      <div class="stat-item" style="flex:1;padding:16px 14px;text-align:center;border-right:1px solid var(--border);background:transparent;transition:background .2s" onmouseover="this.style.background='rgba(212,168,76,.06)'" onmouseout="this.style.background='transparent'">
        <div class="stat-label-full" style="font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--cream-faint);margin-bottom:4px">${ic} ${lb}</div>

        <div class="serif stat-value" style="font-size:26px;font-weight:300;color:var(--gold)">${v}</div>

  </div>`;
}

                    </div>`).join("")}

              ${S.groupDetailTab==="trips"?`

                <div style="display:grid;gap:10px">
                  ${S.groupTrips.map(tr=>`
                    <div style="padding:12px 14px;background:rgba(0,0,0,.2);border-radius:6px;border:1px solid var(--border)">
                      <div style="font-size:13px;font-weight:600;color:var(--cream);margin-bottom:4px">✈️ ${tr.title}</div>
                      ${(tr.regions||[]).length?`<div style="font-size:11px;color:var(--gold);margin-bottom:4px">${(tr.regions||[]).join(" · ")}</div>`:""}
                      ${tr.start_date?`<div style="font-size:11px;color:var(--cream-faint);margin-bottom:6px">📅 ${tr.start_date}${tr.end_date?" → "+tr.end_date:""}</div>`:""}
                      <div style="display:flex;gap:5px;flex-wrap:wrap">
                        ${["yes","maybe","no"].map(r=>`<button class="trip-rsvp-btn" data-tid="${tr.id}" data-rsvp="${r}" style="font-size:10px;padding:4px 10px;border-radius:10px;border:1px solid ${tr.my_rsvp===r?"var(--gold)":"var(--border)"};background:${tr.my_rsvp===r?"var(--gold-faint)":"none"};color:${tr.my_rsvp===r?"var(--gold)":"var(--cream-faint)"};cursor:pointer;font-family:var(--sans)">${r==="yes"?"✓ I'm in":r==="maybe"?"? Maybe":"✗ Can't"}</button>`).join("")}
                      </div>
                    </div>`).join("")}

              ${S.groupDetailTab==="members"?`
                <div style="display:grid;gap:6px">

                      <div style="width:32px;height:32px;border-radius:50%;background:var(--gold-faint);border:1px solid var(--gold-dim);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">${m.avatar_emoji||"🍷"}</div>
                      <div style="flex:1"><div style="font-size:12px;color:var(--cream)">${m.name||"Member"}</div>${m.city?`<div style="font-size:10px;color:var(--cream-faint)">${m.city}</div>`:""}</div>
                      ${m.role==="admin"?`<span style="font-size:9px;color:var(--gold);background:var(--gold-faint);padding:2px 6px;border-radius:3px">Admin</span>`:""}

          <div style="display:grid;gap:8px">
            ${(S.groups||[]).map(g=>`
              <div class="group-card" data-gid="${g.id}" style="display:flex;align-items:center;gap:12px;padding:12px 14px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;cursor:pointer" onmouseover="this.style.borderColor='rgba(220,160,80,.5)'" onmouseout="this.style.borderColor='var(--border)'">

                </div>
                <span style="color:var(--cream-faint)">›</span>
              </div>`).join("")}

      `:""}

      ${S.socialTab==="invite"?`
        ${!invSent?`
          <div style="width:36px;height:3px;background:var(--wine-light);margin-bottom:14px;border-radius:2px"></div>

          <div style="font-size:13px;color:var(--cream-dim);line-height:1.8;margin-bottom:20px">Invite a friend to CellarTrek. They'll receive an email to create their account and can join your groups and connect on events.</div>

function renderMapTab(){
  // Build region clusters
  const regionMap = {};
  S.wines.forEach(w => {
    const c = getRegionCoords(w.region);
    if (!c) return;
    if (!regionMap[w.region]) regionMap[w.region] = { lat:c[0], lng:c[1], wines:[], region:w.region };
    regionMap[w.region].wines.push(w);
  });
  const clusters = Object.values(regionMap);
  const unmapped = S.wines.filter(w => !getRegionCoords(w.region));
  const selRegion = S.mapRegion || null;
  const selCluster = selRegion ? clusters.find(c => c.region === selRegion) : null;

  return `<div style="display:flex;flex-direction:column;height:calc(100vh - 160px);min-height:520px">

    <!-- Header bar -->
    <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 20px 10px;flex-shrink:0">
      <div>
        <div class="serif" style="font-size:26px;font-weight:300;color:var(--cream)">Your Wine World</div>
        <div style="font-size:12px;color:var(--cream-faint);margin-top:2px">${clusters.length} regions · ${S.wines.length} bottles · Click any pin to explore</div>
      </div>
      ${selRegion ? `<button id="close-map-region" class="btn-g" style="font-size:11px;padding:8px 14px">✕ Clear Selection</button>` : ''}
    </div>

    <!-- Map + side panel layout -->
    <div style="display:flex;flex:1;overflow:hidden;gap:0">

      <!-- Leaflet map -->
      <div id="wine-map" style="flex:1;min-width:0;position:relative;background:#0e1a2c;border-top:1px solid var(--border)"></div>

      <!-- Side panel: shown when a region is selected -->
      ${selCluster ? `
      <div class="fadein" style="width:320px;flex-shrink:0;background:rgba(18,6,12,.96);border-left:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column">
        <!-- Region header -->
        <div style="padding:16px 18px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,rgba(30,10,18,.9),rgba(18,6,12,.95))">
          <div class="serif" style="font-size:18px;color:var(--cream);margin-bottom:3px">📍 ${selCluster.region}</div>
          <div style="font-size:11px;color:var(--cream-faint)">${selCluster.wines.length} bottle${selCluster.wines.length>1?'s':''} in your cellar</div>
          <div style="display:flex;gap:6px;margin-top:10px">
            <button id="map-plan-visit" data-wine-id="${selCluster.wines[0].id}" class="btn-p" style="font-size:10px;padding:7px 12px;flex:1">✈️ Plan Visit</button>
            <button id="map-find-more" class="btn-g" style="font-size:10px;padding:7px 12px;flex:1">🔍 More Wines</button>
          </div>
        </div>

        <!-- Your bottles -->
        <div style="padding:12px 14px;border-bottom:1px solid var(--border)">
          <div style="font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:8px">Your Bottles</div>
          ${selCluster.wines.map(w => `
            <div class="wine-row" data-id="${w.id}" style="display:flex;align-items:center;gap:8px;padding:7px 0;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.05)">
              <div style="width:4px;height:32px;background:${w.bc};border-radius:2px;flex-shrink:0"></div>
              <div style="flex:1;min-width:0">
                <div style="font-family:var(--serif);font-size:13px;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${w.name}</div>
                <div style="font-size:10px;color:var(--cream-faint)">${w.vintage} · ${w.rating}/100</div>
              </div>
            </div>`).join('')}
        </div>

        <!-- Travel intel teaser -->
        <div style="padding:12px 14px">
          <div style="font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:10px">Explore the Region</div>
          ${[
            ['✈️', 'Flights', 'Find flights to nearest airport'],
            ['🏨', 'Hotels', 'Curated stays for every budget'],
            ['🍷', 'Wineries', 'Book estate visits & tastings'],
            ['🍽', 'Dining', 'Best restaurants near the estates'],
          ].map(([icon, title, desc]) => `
            <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05)">
              <span style="font-size:18px;width:24px;text-align:center">${icon}</span>
              <div>
                <div style="font-size:12px;font-weight:600;color:var(--cream)">${title}</div>
                <div style="font-size:10px;color:var(--cream-faint)">${desc}</div>
              </div>
            </div>`).join('')}
          <button id="map-full-guide" data-wine-id="${selCluster.wines[0].id}" class="btn-p" style="width:100%;margin-top:12px;padding:11px;font-size:11px">
            🗺 Open Full Travel Guide
          </button>
        </div>

        <!-- Unmapped note -->
        ${unmapped.length ? `<div style="padding:10px 14px;font-size:10px;color:rgba(245,237,224,.3);border-top:1px solid var(--border)">${unmapped.length} bottle${unmapped.length>1?'s':''} not yet mapped</div>` : ''}
      </div>` : `
      <!-- No selection: show region list -->
      <div style="width:280px;flex-shrink:0;background:rgba(18,6,12,.96);border-left:1px solid var(--border);overflow-y:auto">
        <div style="padding:12px 14px;border-bottom:1px solid var(--border)">
          <div style="font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:8px">All Regions</div>
          <div style="font-size:11px;color:var(--cream-faint);line-height:1.6">Click any pin on the map or a region below to explore your wines and plan a visit.</div>
        </div>
        ${clusters.sort((a,b) => b.wines.length - a.wines.length).map(cl => `
          <div class="globe-cluster-card" data-region="${cl.region}" style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer;transition:background .15s" onmouseover="this.style.background='rgba(212,168,76,.08)'" onmouseout="this.style.background='transparent'">
            <div style="width:10px;height:10px;border-radius:50%;background:${cl.wines.length>=4?'#e8c060':cl.wines.length>=2?'#d47840':'#c84060'};flex-shrink:0"></div>
            <div style="flex:1;min-width:0">
              <div style="font-size:11px;font-weight:600;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${cl.region}</div>
              <div style="font-size:9px;color:var(--cream-faint)">${cl.wines.length} bottle${cl.wines.length>1?'s':''}</div>
            </div>
            <div style="font-size:11px;color:var(--gold-dim)">${Math.round(cl.wines.reduce((a,w)=>a+w.rating,0)/cl.wines.length)}</div>
          </div>`).join('')}
        ${unmapped.length ? `<div style="padding:10px 14px;border-top:1px solid var(--border)">
          <div style="font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:rgba(245,237,224,.4);margin-bottom:6px">Not Yet Mapped</div>
          ${[...new Set(unmapped.map(w=>w.region||"Unknown region"))].map(r=>`
            <div style="font-size:10px;color:rgba(245,237,224,.45);line-height:1.6">${r} <span style="color:rgba(245,237,224,.25)">(${unmapped.filter(w=>(w.region||"Unknown region")===r).length})</span></div>
          `).join('')}
        </div>` : ''}
      </div>`}
    </div>
  </div>`;
}

function renderTradeTab(){
  const myListings=S.wines.filter(w=>w.tradeable);
  return`<div style="padding:22px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <div>
        <div class="serif" style="font-size:26px;font-weight:300;color:var(--cream);margin-bottom:3px">${t("tradeMarketplace")}</div>
        <div style="font-size:12px;color:var(--cream-faint)">${t("swapBottles")}</div>
      </div>
      <button id="open-trip-builder" class="btn-p" style="font-size:11px;padding:9px 16px">🗺 Build Trip</button>
      <button id="list-my-wine" class="btn-p" style="font-size:11px;padding:9px 16px">${t("listMyWine")}</button>
    </div>

    ${myListings.length?`<div style="margin-bottom:22px">
      <div style="font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:10px">${t("yourListings")}</div>

        <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
          ${btl(tl.bc,tl.lc,52)}
          <div style="flex:1">
            <div class="serif" style="font-size:17px;font-weight:300;color:var(--cream);line-height:1.2">${tl.wine}</div>
            <div style="font-size:10px;color:var(--cream-faint);margin-top:2px">${tl.vintage} · ${tl.region}</div>

        ${tl.notes?`<div style="font-size:11px;color:var(--cream-faint);line-height:1.6;margin-bottom:10px;padding:8px 10px;background:rgba(255,255,255,.05);border-radius:4px">${tl.notes}</div>`:""}
        <div style="display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--border)">
          <div>
            <div style="font-size:10px;color:var(--cream-faint);margin-bottom:2px">Listed by</div>
            <div style="font-size:12px;color:var(--cream)">${tl.userFlag} ${tl.userName}</div>
            <div style="font-size:10px;color:var(--gold-dim);margin-top:2px">Seeking: ${tl.seeking}</div>
          </div>
          <button class="btn-p make-offer" data-tid="${tl.id}" style="font-size:10px;padding:8px 14px">${t("offerTrade")}</button>
        </div>
      </div>`).join("")}
    </div>
  </div>`;
}

// ═══ MAIN RENDER ═══
function render(){
  _svgId=0;
  // Apply white-label colours on first render
  if((WL_PRIMARY||WL_ACCENT)&&!document.getElementById('wl-styles')){
    const st=document.createElement('style');
    st.id='wl-styles';
    st.textContent=`:root{${WL_PRIMARY?`--wine:${WL_PRIMARY};--wine-deep:${WL_PRIMARY};--wine-light:${WL_PRIMARY};`:''}${WL_ACCENT?`--gold:${WL_ACCENT};`:''}}`; 
    document.head.appendChild(st);
  }
  // Apply personal theme — updates live whenever S.user.themeMode/themeAccent changes,
  // unlike white-label which only applies once. Personal theme takes priority over WL.
  applyPersonalTheme();
  document.title = WL_NAME;
  const{screen,tab,wines,sel,showAdd,showInvite}=S;
  const root=document.getElementById("root");

  if(screen==="landing"){
    root.innerHTML=renderLanding();
    on("enter-btn",()=>{
      const email = (document.getElementById("land-email")||{}).value||"";
      if(S.authMode==="forgot"){
        if(!email){ S.authError="Please enter your email."; render(); return; }
        doForgotPassword(email);
        return;
      }
      const pw    = (document.getElementById("land-pw")||{}).value||"";
      if(!email||!pw){ S.authError="Please enter email and password."; render(); return; }
      if(S.authMode==="signup"){
        const name = (document.getElementById("land-name")||{}).value||"";
        doSignup(email, pw, name);
      } else {
        doLogin(email, pw);
      }
    });
    on("auth-mode-toggle",()=>{
      S.authMode = S.authMode==="forgot" ? "login" : (S.authMode==="signup" ? "login" : "signup");
      S.authError = ""; S.forgotResetUrl = "";
      render();
    });
    on("forgot-password-link",()=>{
      S.authMode = "forgot";
      S.authError = ""; S.forgotResetUrl = "";
      render();
    });
    on("demo-link",()=>{S.screen="dashboard";render();});
    document.querySelectorAll(".ll").forEach(e=>e.onclick=()=>{S.lang=e.dataset.lang;render();});
    return;
  }

  // Dashboard
  const cellar=wines.filter(w=>w.mode==="cellar");
  const consumed=wines.filter(w=>w.mode==="consumed");
  let mainContent="";
  if(tab==="map") mainContent=renderMapTab();
  else if(tab==="trade") mainContent=renderTradeTab();
  else if(tab==="travel") mainContent=renderTravelTab();
  else if(tab==="learn")  mainContent=renderLearnTab();
  else if(tab==="compare") mainContent=renderCompareTab();
  else if(tab==="shop") mainContent=renderShopTab();
  else{
    const list=tab==="cellar"?cellar:consumed;
    mainContent=renderCellarTab(list,tab);
  }

  root.innerHTML=`
    <div class="cellar-bg" style="background-image:url(${CELLAR_IMG})"></div>
    <div class="app-layer">
      ${renderNavbar()}
      ${renderStats()}
      <div class="tab-bar">
        ${[["cellar","🍾 "+t("cellar")],["consumed","✓ "+t("consumed")],["compare","⚖ "+t("navCompare")],["map","🗺 "+t("map")],...(WL_SHOW_TRADE?[["trade","🔄 "+t("trade")]]:[[]]),...(WL_SHOW_TRAVEL?[["travel","✈️ "+t("travel")]]:[[]]),...(S.joinedVenues.length?[["venues","🏛 "+t("venues")]]:[]),["learn","🎓 "+t("navLearn")]].map(([tabId,tabLabel])=>`
          <div class="tab${tab===tabId?" active":""}" data-tab="${tabId}">${tabLabel}${tabId==="trade"?`<span style="margin-left:5px;background:var(--wine-light);color:#fff;font-size:9px;padding:1px 5px;border-radius:10px">${TRADE_LISTINGS.length}</span>`:""}</div>`).join("")}
      </div>
      ${(sel && (tab==='cellar'||tab==='consumed')) ? `
        <div class="split-panel">
          <div class="list-pane">${mainContent}</div>
          <div class="detail-pane">${renderDetailPanel(sel)}</div>
        </div>
      ` : mainContent}
      <div style="text-align:center;padding:26px 16px 20px;border-top:1px solid rgba(220,160,80,.15);background:rgba(10,4,8,.55)">
        <span style="font-size:11px;color:rgba(245,237,224,.35);letter-spacing:.08em;font-family:var(--sans)">${WL_FOOTER_URL?`<a href="${WL_FOOTER_URL}" target="_blank" rel="noopener" style="color:var(--gold);text-decoration:none">${WL_FOOTER}</a>`:`${WL_FOOTER}`}</span>
      </div>
    </div>
    ${sel?(tab==='cellar'||tab==='consumed'?`<div class="detail-modal-overlay">${renderDetailModal(sel)}</div>`:renderDetailModal(sel)):''}
    ${showAdd?renderAddModal():""}
    ${showInvite?renderInviteModal():""}
    ${S.showTrade?renderTradeModal(S.showTrade):""}
    ${S.showCsv||csvImporting?renderCsvModal():""}
    ${(S.aiLoading||S.travelLoading||S.drinkingWindowLoading||S.pairingLoading||S.articlesLoading||S.labelLoading||S.itineraryLoading||sommelierLoading)?'<button class="cancel-ai-btn" id="cancel-ai-btn">⏹ Cancel</button>':""}
    ${S.showSommelier?renderSommelierModal():""}
    ${S.venueWelcome?renderVenueWelcomeModal():""}
    ${S.showReviewForm?renderReviewFormModal():""}
    ${S.showQRScanner?renderQRScannerModal():""}
    ${S.showAccount?renderAccountModal():""}
    ${S.publicProfile||S.publicProfileLoading?renderPublicProfileModal():""}
    ${S.showCreateGroup?renderCreateGroupModal():""}
    ${S.showCreateEvent?renderCreateEventModal():""}
    ${S.invPreview?renderInvPreviewModal():""}
    ${S.showEventProduction?renderEventProductionModal():""}
    ${S.showOpenBottle?renderOpenBottleModal():""}
    ${S.showCreateTrip?renderCreateTripModal():""}
    ${S.showShop?renderMyOrdersModal():""}
    ${S.valuationLoading||S.valuationData?renderValuationModal():""}
    ${S.auctionLoading||S.auctionPkg?renderAuctionModal():""}
    ${S.drinkingWindowLoading||S.drinkingWindowData?renderDrinkingWindowModal():""}
    ${S.pairingLoading||S.pairingData?renderFoodPairingModal():""}
    ${S.showTripBuilder||S.itineraryLoading||S.itineraryData?renderTripBuilderModal():""}
    <!-- Mobile bottom nav -->
    <nav class="bottom-nav" id="bottom-nav">
      ${[["cellar","🍾",t("cellar")],["consumed","✓",t("consumed")],["map","🗺",t("map")],["trade","🔄",t("trade")],["travel","✈️",t("travel")],...(S.joinedVenues.length?[["venues","🏛","Venues"]]:[]),["shop","🛍","Shop"],["learn","🎓",t("navLearn")]].map(([tabId,icon,label])=>`
        <button class="bottom-nav-item${tab===tabId?" active":""}" data-tab="${tabId}">
          <span class="nav-icon">${icon}</span>
          <span>${label}</span>
        </button>`).join("")}
    </nav>
    <!-- FAB -->
    <button class="fab" id="fab-add" title="${t("addWine")}">＋</button>
    ${S.showTravel&&!S.travelLoading?renderTravelModal(S.showTravel):""}
    ${S.travelLoading?renderTravelModal(S.showTravel||{}):""}
  </div>
  `;

  // ── NAVBAR EVENTS ──
  on("logo-home",()=>{S.screen="landing";render();});
  on("lang-toggle",()=>{S.showLangPicker=!S.showLangPicker;render();});
  on("lang-toggle-mobile",()=>{S.showLangPicker=!S.showLangPicker;render();});
  document.querySelectorAll(".nl").forEach(e=>e.onclick=()=>{S.lang=e.dataset.lang;S.showLangPicker=false;render();});
  on("add-btn",()=>{S.showAdd=true;S.step=1;render();});
  on("shop-nav-btn",()=>{S.tab="shop";if(!S.shopItems.length)loadShopItems(S.shopCategory);render();});
on("share-btn",()=>{S.showInvite=true;S.socialTab="profile";S.invSent=false;if(S.user&&!S.friends.length&&!S.groups.length)loadSocialData();render();});
  on("signout-btn",()=>{doLogout();});
  on("account-btn",()=>{openAccountModal();});
  on("mm-account-btn",()=>{S.showMobileMenu=false;openAccountModal();});

  // ── Account Modal ──
  on("close-account-modal",()=>{closeAccountModal();});
  const accBg=document.getElementById("account-modal-bg");
  if(accBg)accBg.onclick=e=>{if(e.target===accBg)closeAccountModal();};
  on("account-tab-profile",()=>{S.accountTab="profile";render();});
  on("account-tab-theme",()=>{S.accountTab="theme";render();});
  on("save-account-btn",()=>{saveAccountProfile();});

  const accName=document.getElementById("acc-name");if(accName)accName.oninput=e=>{S.accountDraft.name=e.target.value;};
  const accCity=document.getElementById("acc-city");if(accCity)accCity.oninput=e=>{S.accountDraft.city=e.target.value;};
  const accBio=document.getElementById("acc-bio");if(accBio)accBio.oninput=e=>{S.accountDraft.bio=e.target.value.slice(0,280);render();};
  const accFavWines=document.getElementById("acc-fav-wines");if(accFavWines)accFavWines.oninput=e=>{S.accountDraft.favoriteWines=e.target.value;};
  const accFavSpots=document.getElementById("acc-fav-spots");if(accFavSpots)accFavSpots.oninput=e=>{S.accountDraft.favoriteSpots=e.target.value;};
  const accPublic=document.getElementById("acc-public");if(accPublic)accPublic.onchange=e=>{S.accountDraft.profilePublic=e.target.checked;};

  document.querySelectorAll(".avatar-emoji-pick").forEach(el=>el.onclick=()=>{
    S.accountDraft.avatarEmoji=el.dataset.emoji; render();
  });

  // Use event delegation for theme/accent pickers — these are inside a modal
  // that re-renders when tabs switch, so querySelectorAll-based wiring
  // runs before the new tab's elements exist in the DOM.
  // Event delegation on document catches clicks regardless of when elements render.
  document.onclick = document.onclick || null; // ensure no duplicate
  if(!document._themePickerBound){
    document._themePickerBound = true;
    document.addEventListener('click', function(e){
      const modeEl = e.target.closest('.theme-mode-pick');
      if(modeEl && modeEl.dataset.mode){
        S.accountDraft.themeMode = modeEl.dataset.mode;
        applyPersonalTheme();
        render();
        return;
      }
      const accentEl = e.target.closest('.theme-accent-pick');
      if(accentEl && accentEl.dataset.accent){
        S.accountDraft.themeAccent = accentEl.dataset.accent;
        applyPersonalTheme();
        render();
        return;
      }
      const avatarEl = e.target.closest('.avatar-emoji-pick');
      if(avatarEl && avatarEl.dataset.emoji){
        S.accountDraft.avatarEmoji = avatarEl.dataset.emoji;
        render();
        return;
      }
      const purchaseEl = e.target.closest('.purchase-type-pill');
      if(purchaseEl && purchaseEl.dataset.ptype){
        S.nw={...S.nw,purchaseType:purchaseEl.dataset.ptype,priceMl:purchaseEl.dataset.ptype==="bottle"?750:125};
        render();
        return;
      }
      const editPurchaseEl = e.target.closest('.edit-purchase-type-pill');
      if(editPurchaseEl && editPurchaseEl.dataset.ptype){
        S.editPriceDraft={...S.editPriceDraft,purchaseType:editPurchaseEl.dataset.ptype,priceMl:editPurchaseEl.dataset.ptype==="bottle"?750:125};
        render();
        return;
      }
    });
  }
  const accAccentCustom=document.getElementById("acc-accent-custom");
  if(accAccentCustom)accAccentCustom.oninput=e=>{S.accountDraft.themeAccent=e.target.value;};
  on("acc-accent-reset",()=>{S.accountDraft.themeAccent="";render();});

  // ── Public Profile Modal ──
  on("close-public-profile",()=>{S.publicProfile=null;render();});
  const ppBg=document.getElementById("public-profile-bg");
  if(ppBg)ppBg.onclick=e=>{if(e.target===ppBg){S.publicProfile=null;render();}};
  on("notif-btn",()=>{S.notifications=0;render();});
  on("notif-btn-mobile",()=>{S.notifications=0;render();});

  // ── Mobile hamburger menu ──
  on("hamburger-btn",()=>{S.showMobileMenu=true;render();});
  on("close-mobile-menu",()=>{S.showMobileMenu=false;render();});
  const mmBg=document.getElementById("mobile-menu-bg");
  if(mmBg)mmBg.onclick=e=>{if(e.target===mmBg){S.showMobileMenu=false;render();}};
  on("mm-sommelier-btn",()=>{S.showMobileMenu=false;S.showSommelier=true;render();setTimeout(()=>{const el=document.getElementById('sommelier-chat');if(el)el.scrollTop=el.scrollHeight;},50);});
  on("mm-shop-btn",()=>{S.showMobileMenu=false;S.tab="shop";if(!S.shopItems.length)loadShopItems(S.shopCategory);render();});
  on("mm-scan-qr-btn",()=>{S.showMobileMenu=false;render();openQRScanner();});
  on("mm-csv-btn",()=>{S.showMobileMenu=false;S.showCsv=true;render();});
  on("mm-share-btn",()=>{S.showMobileMenu=false;S.showInvite=true;S.socialTab="profile";S.invSent=false;if(S.user&&!S.friends.length&&!S.groups.length)loadSocialData();render();});
  on("mm-signout-btn",()=>{S.showMobileMenu=false;doLogout();});

  // ── TAB EVENTS ──
  document.querySelectorAll("[data-tab]").forEach(e=>e.onclick=()=>{
    S.tab=e.dataset.tab;
    if(e.dataset.tab==="social" && S.user && !S.friends.length && !S.groups.length) loadSocialData();
    if(e.dataset.tab==="shop" && !S.shopItems.length) loadShopItems(S.shopCategory);
    render();
  });

  // ── Compare tab handlers ─────────────────────────────────────────
  document.querySelectorAll("[data-cmpmode]").forEach(e=>e.onclick=()=>{
    S.cmpMode=e.dataset.cmpmode;
    S.cmpSlots = S.cmpMode==="venue" ? [{role:"cand",query:"",wine:null}]
      : S.cmpMode==="blind" ? [{role:"cand",query:"",wine:null},{role:"cand",query:"",wine:null}]
      : [{role:"cand",query:"",wine:null},{role:"ref",query:"",wine:null}];
    S.cmpResult=null; S.cmpOrder=[]; render();
  });
  document.querySelectorAll("[data-cmpq]").forEach(e=>e.oninput=()=>{ S.cmpSlots[+e.dataset.cmpq].query=e.value; });
  document.querySelectorAll("[data-cmpq]").forEach(e=>e.onkeydown=(ev)=>{ if(ev.key==="Enter"){const i=+e.dataset.cmpq;const q=(e.value||"").trim();if(q){S.cmpSlots[i].wine=ctEstimateTyped(q);S.cmpSlots[i].query="";render();}} });
  document.querySelectorAll("[data-cmppick]").forEach(e=>e.onclick=()=>{
    const [i,src,enc]=e.dataset.cmppick.split("|"); const name=decodeURIComponent(enc);
    const p=cmpPool(); const all=[...p.cellar,...p.consumed,...p.venue];
    const w=all.find(x=>x.name===name&&x.src===src); if(w){S.cmpSlots[+i].wine=w;S.cmpSlots[+i].query="";} render();
  });
  document.querySelectorAll("[data-cmpclear]").forEach(e=>e.onclick=()=>{const i=+e.dataset.cmpclear;S.cmpSlots[i].wine=null;S.cmpSlots[i].query="";render();});
  document.querySelectorAll("[data-cmprm]").forEach(e=>e.onclick=()=>{S.cmpSlots.splice(+e.dataset.cmprm,1);render();});
  on("cmp-add",()=>{S.cmpSlots.push({role:"cand",query:"",wine:null});render();});
  on("cmp-go",()=>{cmpRun();});
  on("cmp-reset",()=>{const m=S.cmpMode;S.cmpResult=null;S.cmpOrder=[];document.querySelector("[data-cmpmode='"+m+"']")&&document.querySelector("[data-cmpmode='"+m+"']").click();
    S.cmpSlots=m==="venue"?[{role:"cand",query:"",wine:null}]:m==="blind"?[{role:"cand",query:"",wine:null},{role:"cand",query:"",wine:null}]:[{role:"cand",query:"",wine:null},{role:"ref",query:"",wine:null}];render();});
  document.querySelectorAll("[data-cmporder]").forEach(e=>e.onclick=()=>{cmpAddOrder(decodeURIComponent(e.dataset.cmporder));});
  document.querySelectorAll("[data-cmpqty]").forEach(e=>e.onclick=()=>{const [enc,d]=e.dataset.cmpqty.split("|");cmpOrderQty(decodeURIComponent(enc),+d);});
  on("cmp-send",()=>{cmpSendOrder();});
  document.querySelectorAll(".social-tab-btn").forEach(e=>e.onclick=()=>{S.socialTab=e.dataset.stab;render();});
  document.querySelectorAll(".social-group-tab").forEach(e=>e.onclick=()=>{S.groupDetailTab=e.dataset.gtab;render();});

  on("show-profile-qr-btn",()=>{S.profileQRVisible=!S.profileQRVisible;render();});
  on("scan-friend-qr-btn",()=>{openQRScanner();});

  on("create-group-btn",()=>{S.showCreateGroup=true;render();});
  on("close-create-group",()=>{S.showCreateGroup=false;render();});
  const cgBg=document.getElementById("create-group-bg");
  if(cgBg)cgBg.onclick=e=>{if(e.target===cgBg){S.showCreateGroup=false;render();}};

  const cgName=document.getElementById("cg-name");if(cgName)cgName.oninput=e=>{S.createGroupDraft.name=e.target.value;};
  const cgDesc=document.getElementById("cg-desc");if(cgDesc)cgDesc.oninput=e=>{S.createGroupDraft.description=e.target.value;};
  document.querySelectorAll(".group-emoji-pick").forEach(el=>el.onclick=()=>{S.createGroupDraft.avatarEmoji=el.dataset.gem;render();});
  document.querySelectorAll(".group-type-pick").forEach(el=>el.onclick=()=>{S.createGroupDraft.type=el.dataset.gtype;render();});
  on("submit-create-group",()=>{createGroup();});

  document.querySelectorAll(".group-card").forEach(el=>el.onclick=async()=>{
    const g=S.groups.find(x=>x.id===el.dataset.gid);
    if(g){ S.activeGroup=g; S.groupDetailTab="events"; render(); await loadGroupDetail(g.id); }
  });
  on("social-back-btn",()=>{S.activeGroup=null;S.groupMembers=[];S.groupEvents=[];S.groupTrips=[];render();});

  on("group-create-event-btn",()=>{S.showCreateEvent=true;S.eventModalTab="details";S.editingEvent=null;render();});
  const ceBg=document.getElementById("create-event-bg");
  if(ceBg)ceBg.onclick=e=>{if(e.target===ceBg){S.showCreateEvent=false;render();}};
  const ceTitle=document.getElementById("ce-title");if(ceTitle)ceTitle.oninput=e=>{S.createEventDraft.title=e.target.value;};
  const ceDate=document.getElementById("ce-date");if(ceDate)ceDate.onchange=e=>{S.createEventDraft.eventDate=e.target.value;};
  const ceTime=document.getElementById("ce-time");if(ceTime)ceTime.onchange=e=>{S.createEventDraft.eventTime=e.target.value;};
  const ceVenue=document.getElementById("ce-venue");if(ceVenue)ceVenue.oninput=e=>{S.createEventDraft.venueName=e.target.value;};
  const ceAddr=document.getElementById("ce-addr");if(ceAddr)ceAddr.oninput=e=>{S.createEventDraft.venueAddress=e.target.value;};
  const ceDesc=document.getElementById("ce-desc");if(ceDesc)ceDesc.oninput=e=>{S.createEventDraft.description=e.target.value;};
  // Style picker is the only thing that should trigger a re-render (updates preview)
  document.querySelectorAll(".inv-style-pick").forEach(el=>el.onclick=()=>{S.createEventDraft.invStyle=el.dataset.style;render();});

  // Modal tab switching (also used by Next/Preview buttons)
  document.querySelectorAll(".ev-modal-tab[data-tab]").forEach(el=>el.onclick=()=>{
    // Save contenteditable values before switching tabs
    const desc=document.getElementById("ce-desc-editor");
    const inv=document.getElementById("ce-inv-editor");
    if(desc) S.createEventDraft.description=desc.innerText.trim();
    if(inv) S.createEventDraft.manualInvText=inv.innerText.trim();
    S.eventModalTab=el.dataset.tab; render();
  });

  // Background image upload
  const invBgFile=document.getElementById("inv-bg-file");
  const invBgZone=document.getElementById("inv-bg-drop-zone");
  if(invBgFile) invBgFile.onchange=e=>{
    const file=e.target.files[0];
    if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{S.createEventDraft.invBgImage=ev.target.result;render();};
    reader.readAsDataURL(file);
  };
  if(invBgZone){
    invBgZone.ondragover=e=>{e.preventDefault();invBgZone.style.borderColor="var(--gold)";invBgZone.style.background="var(--gold-faint)";};
    invBgZone.ondragleave=()=>{invBgZone.style.borderColor="var(--border)";invBgZone.style.background="";};
    invBgZone.ondrop=e=>{
      e.preventDefault();
      invBgZone.style.borderColor="var(--border)";invBgZone.style.background="";
      const file=e.dataTransfer.files[0];
      if(file&&file.type.startsWith("image/")){
        const reader=new FileReader();
        reader.onload=ev=>{S.createEventDraft.invBgImage=ev.target.result;render();};
        reader.readAsDataURL(file);
      }
    };
  }
  on("clear-inv-bg",()=>{S.createEventDraft.invBgImage="";render();});

  });

    const li=parseInt(e.target.dataset.li);

  document.querySelectorAll(".inv-ml").forEach(el=>el.onchange=e=>{
    const li=parseInt(e.target.dataset.li);

  });

  // ── AI ENHANCEMENT EVENTS ──
  on("sommelier-btn",()=>{S.showSommelier=true;render();setTimeout(()=>{const el=document.getElementById('sommelier-chat');if(el)el.scrollTop=el.scrollHeight;},50);});
  on("learn-nav-btn",()=>{S.tab="learn";if(!Object.keys(S.eduProgress).length)loadEduProgress();render();});

  document.querySelectorAll(".edu-path-item").forEach(el=>el.onclick=()=>{

    S.eduPath=pathId; S.eduTopic=null; S.eduContent=null; S.eduFormat='lesson'; render();
  });

  document.querySelectorAll(".edu-topic-row").forEach(el=>el.onclick=()=>{
    if(el.dataset.locked==='true') return;
    const pathId=el.dataset.path, topicId=el.dataset.topic;

    // Mark as seen
    saveEduProgress(pathId, topicId, false, null);
  });

  document.querySelectorAll(".edu-fmt-btn").forEach(el=>el.onclick=()=>{
    const fmt=el.dataset.fmt;
    const path=EDU_CURRICULUM.find(p=>p.id===S.eduPath);
    const topic=path?.topics.find(t=>t.id===S.eduTopic);
    if(!topic) return;
    S.eduFormat=fmt; S.eduContent=null; render();
    loadEduContent(S.eduPath, S.eduTopic, fmt);
  });

  on("edu-back-btn",()=>{ S.eduTopic=null; S.eduContent=null; render(); });

  on("edu-mark-done-btn",async(e)=>{
    const btn=document.getElementById("edu-mark-done-btn");
    const pathId=btn?.dataset.path||S.eduPath;
    const topicId=btn?.dataset.topic||S.eduTopic;
    await saveEduProgress(pathId, topicId, true, null);
    // Advance to next topic
    const path=EDU_CURRICULUM.find(p=>p.id===pathId);
    const idx=path?.topics.findIndex(t=>t.id===topicId);
    if(path&&idx>=0&&idx<path.topics.length-1){
      const next=path.topics[idx+1];
      S.eduTopic=next.id; S.eduFormat='lesson'; S.eduContent=null; render();
      loadEduContent(pathId, next.id, 'lesson');
    } else {
      S.eduTopic=null; render();
    }
  });

  // Flashcard handlers
  on("edu-reveal-btn",()=>{ S.eduFlashRevealed=true; render(); });
  on("edu-flash-yes-btn",()=>{
    const cards=S.eduContent?.cards||[];
    if(S.eduFlashIdx<cards.length-1){ S.eduFlashIdx++; S.eduFlashRevealed=false; render(); }
    else { S.eduFlashIdx=0; S.eduFlashRevealed=false; render(); }
  });
  on("edu-flash-no-btn",()=>{ S.eduFlashRevealed=false; render(); });
  on("edu-flash-maybe-btn",()=>{
    const cards=S.eduContent?.cards||[];
    if(S.eduFlashIdx<cards.length-1){ S.eduFlashIdx++; S.eduFlashRevealed=false; render(); }
    else { S.eduFlashIdx=0; S.eduFlashRevealed=false; render(); }
  });

  // Quiz handlers
  document.querySelectorAll(".edu-quiz-opt").forEach(el=>el.onclick=()=>{
    if(S.eduQuizSubmitted) return;
    const qi=parseInt(el.dataset.qi), oi=parseInt(el.dataset.oi);
    S.eduQuizAnswers={...S.eduQuizAnswers,[qi]:oi}; render();
  });
  on("edu-submit-quiz-btn",async()=>{
    const btn=document.getElementById("edu-submit-quiz-btn");
    const pathId=btn?.dataset.path||S.eduPath;
    const topicId=btn?.dataset.topic||S.eduTopic;
    const qs=S.eduContent?.questions||[];
    const correct=Object.entries(S.eduQuizAnswers).filter(([i,a])=>a===qs[i]?.correct).length;
    const score=Math.round(correct/qs.length*100);
    S.eduQuizSubmitted=true; render();
    await saveEduProgress(pathId, topicId, score>=60, score);
  });
  on("edu-retry-quiz-btn",()=>{
    S.eduQuizAnswers={}; S.eduQuizSubmitted=false; S.eduContent=null; render();
    loadEduContent(S.eduPath, S.eduTopic, 'quiz');
  });
  on("edu-next-topic-btn",async()=>{
    const btn=document.getElementById("edu-next-topic-btn");
    const pathId=btn?.dataset.path||S.eduPath;
    const topicId=btn?.dataset.topic||S.eduTopic;
    const path=EDU_CURRICULUM.find(p=>p.id===pathId);
    const idx=path?.topics.findIndex(t=>t.id===topicId);
    if(path&&idx>=0&&idx<path.topics.length-1){
      const next=path.topics[idx+1];
      S.eduTopic=next.id; S.eduFormat='lesson'; S.eduContent=null; render();
      loadEduContent(pathId, next.id, 'lesson');

    const inp=document.getElementById("edu-explore-input");

    if(inp) inp.innerText='';

    await sendEduExplore(q);
  });
  on("edu-explore-clear-btn",()=>{ S.eduExploreHistory=[]; render(); });

  // Enter key on explore input
  const exploreInp=document.getElementById("edu-explore-input");
  if(exploreInp) exploreInp.onkeydown=async(e)=>{
    if(e.key==='Enter'&&!e.shiftKey){
      e.preventDefault();
      const q=exploreInp.innerText.trim();
      if(!q) return;
      exploreInp.innerText='';
      S.eduExploreInput='';
      await sendEduExplore(q);
    }
  };
  on("close-sommelier",()=>{S.showSommelier=false;render();});
  const somBg=document.getElementById("sommelier-bg");
  if(somBg)somBg.onclick=e=>{if(e.target===somBg){S.showSommelier=false;render();}};

  document.querySelectorAll(".sommelier-suggest").forEach(e=>e.onclick=()=>askSommelier(e.dataset.q));

  // Drinking window
  on("detail-dw-btn",()=>{if(S.sel)calcDrinkingWindow(S.sel);});
  on("close-dw",()=>{S.drinkingWindowData=null;S.drinkingWindowWine=null;render();});
  const dwBg=document.getElementById("dw-bg");
  if(dwBg)dwBg.onclick=e=>{if(e.target===dwBg){S.drinkingWindowData=null;S.drinkingWindowWine=null;render();}};

  // Food pairing
  on("detail-pairing-btn",()=>{if(S.sel)fetchFoodPairing(S.sel);});
  on("close-pairing",()=>{S.pairingData=null;S.pairingWine=null;render();});
  const pairBg=document.getElementById("pairing-bg");
  if(pairBg)pairBg.onclick=e=>{if(e.target===pairBg){S.pairingData=null;S.pairingWine=null;render();}};

  // Trip builder
  on("open-trip-builder",()=>{S.showTripBuilder=true;S.itineraryData=null;render();});
  on("close-trip",()=>{S.showTripBuilder=false;S.itineraryData=null;render();});
  const tripBg=document.getElementById("trip-bg");
  if(tripBg)tripBg.onclick=e=>{if(e.target===tripBg){S.showTripBuilder=false;S.itineraryData=null;render();}};
  on("build-trip-btn",()=>{
    const cbs=document.querySelectorAll(".trip-region-cb:checked");
    const regions=[...cbs].map(cb=>cb.value);
    if(regions.length>=1)buildTripItinerary(regions);
  });

  on("cancel-ai-btn", cancelAI);

  // ── LEAFLET MAP EVENTS ──
  // Init map whenever map tab is active
  if(S.tab === 'map') {
    setTimeout(initLeafletMap, 80);
  }

  // Region list sidebar clicks
  document.querySelectorAll(".globe-cluster-card").forEach(e=>e.onclick=()=>{
    const region = e.dataset.region;
    S.mapRegion = S.mapRegion === region ? null : region;
    render();
  });

  on("close-map-region", () => { S.mapRegion = null; render(); });
  on("map-find-more", () => {
    if(S.mapRegion){ S.cellarSearch = S.mapRegion; S.tab = 'cellar'; render(); }

    if(wine){ S.showTravel = wine; S.travelData = null; fetchTravelData(wine); }

  on("map-full-guide", () => {
    const wid = document.getElementById('map-full-guide')?.dataset.wineId;
    const wine = S.wines.find(w => w.id == wid);
    if(wine){ S.showTravel = wine; S.travelData = null; fetchTravelData(wine); }
  });

  // ── CSV IMPORT EVENTS ──
  on("csv-btn",()=>{S.showCsv=true;render();});

  on("scan-qr-empty-btn",()=>{openQRScanner();});
  on("close-qr-scanner",()=>{closeQRScanner();});
  on("start-qr-camera-btn",()=>{startQRCamera();});
  on("retry-qr-camera-btn",()=>{startQRCamera();});
  const qrBg=document.getElementById("qr-scanner-bg");
  if(qrBg)qrBg.onclick=e=>{if(e.target===qrBg){closeQRScanner();}};
  on("close-csv",()=>{S.showCsv=false;render();});
  const csvBg=document.getElementById("csv-bg");
  if(csvBg)csvBg.onclick=e=>{if(e.target===csvBg){S.showCsv=false;render();}};
  const csvFile=document.getElementById("csv-file-input");
  if(csvFile)csvFile.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      const raw=parseCsv(ev.target.result);
      S.showCsv=false;
      enrichAndImport(raw);
    };
    r.readAsText(f);
  };
  on("load-demo-csv",()=>{
    S.showCsv=false;
    // Load pre-enriched CSV wines directly
    const existing=new Set(S.wines.map(w=>w.id));
    const toAdd=loadCSVWines().filter(w=>!existing.has(w.id));
    S.wines=[...toAdd,...S.wines];
    S.tab="cellar";
    render();
    // Flash notification
    S.notifications=(S.notifications||0)+1;
    setTimeout(()=>{render();},100);
  });

}

window.onerror=function(msg,src,line){var b=document.getElementById("err-banner");if(b){b.style.display="block";b.textContent="JS Error line "+line+": "+msg;}return false;};

// ── Restore session and load wines on page load ────────────────
(function initSession(){
  if(tryRestoreSession()){
    S.screen="dashboard";
  }
})();

// ── Venue join via URL param (e.g. native camera app scanned the QR and opened a browser link) ──
(function checkVenueJoinLink(){
  const params = new URLSearchParams(window.location.search);
  const vid = params.get("v");
  if(vid){
    window.history.replaceState({},"",window.location.pathname);
    S.screen = "dashboard";  // Must be logged in to actually join — dashboard shows login if not
    setTimeout(()=>fetchVenueProfile(vid, true), 300);  // Slight delay so initial render completes first
  }
})();

if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",()=>{render();if(S.user)loadWinesFromServer();});}else{render();if(S.user)loadWinesFromServer();}

</script>
