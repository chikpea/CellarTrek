<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --wine:#8b2240;--wine-deep:#5a1428;--wine-light:#b82040;
  --gold:#d4a84c;--gold-dim:rgba(212,168,76,.5);--gold-faint:rgba(212,168,76,.18);
  --cream:#f5ede0;--cream-dim:rgba(245,237,224,.65);--cream-faint:rgba(245,237,224,.35);
  --bg:#3a1f28;--bg-deep:#2a1520;--bg-card:rgba(58,26,30,.92);--bg-card2:rgba(50,22,26,.92);
  --border:rgba(220,160,80,.3);--border-hi:rgba(220,160,80,.6);
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Montserrat',system-ui,sans-serif;
  --radius:6px;
}
body{font-family:var(--sans);background:var(--bg);color:var(--cream);min-height:100vh;overflow-x:hidden}
/* ── Cellar background image ── */
.cellar-bg{
  position:fixed;inset:0;z-index:0;
  background-size:cover;background-position:center;
  filter:brightness(.32) saturate(.7);
  pointer-events:none;
}
.app-layer{position:relative;z-index:1;min-height:100vh;}
.serif{font-family:var(--serif)}
.chip{display:inline-block;padding:4px 12px;border:1px solid var(--gold-dim);font-size:11px;color:#e8a86a;margin:3px;border-radius:20px;font-family:var(--sans)}
.chip.gld{border-color:rgba(220,170,60,.6);color:var(--gold)}
.chip.sel{background:var(--gold-faint);border-color:var(--gold);color:var(--gold)}
.chip-btn{cursor:pointer;transition:all .2s}.chip-btn:hover{background:var(--gold-faint);border-color:var(--gold);color:var(--gold)}
.wine-card{border:1px solid var(--border);cursor:pointer;transition:all .25s;overflow:hidden;background:var(--bg-card);border-radius:var(--radius)}
.wine-card:hover{border-color:var(--gold);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.4)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.78);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px;overflow-y:auto}
.modal{background:rgba(50,20,26,.97);border:1px solid var(--border);border-radius:var(--radius);position:relative;backdrop-filter:blur(12px)}
.field-label{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--cream-faint);display:block;margin-bottom:7px;font-family:var(--sans)}
.inp{background:rgba(255,255,255,.1);border:1px solid var(--border);color:var(--cream);padding:11px 14px;font-size:13px;width:100%;outline:none;font-family:var(--sans);border-radius:4px;transition:border-color .2s}

/* ── Light theme ── */
html.theme-light body { background: #f0e8d8; color: #241218; }
html.theme-light { --wine:#8b2240; --wine-deep:#6a1830; --wine-light:#b82040;
  --cream:#241218; --cream-dim:rgba(36,18,24,.75); --cream-faint:rgba(36,18,24,.45);
  --bg:#f0e8d8; --bg-deep:#e8dcc8; --bg-card:rgba(255,255,255,.95); --bg-card2:rgba(250,244,232,.95);
  --border:rgba(139,34,64,.2); --border-hi:rgba(139,34,64,.45);
  --gold:#8b6020; --gold-dim:rgba(139,96,32,.5); --gold-faint:rgba(139,96,32,.12);
}
html.theme-light .navbar-inner { background: rgba(240,232,216,.97) !important; border-bottom-color: rgba(139,34,64,.2) !important; }
html.theme-light .inp { background: rgba(0,0,0,.06) !important; color: #241218 !important; }
html.theme-light .modal { background: rgba(255,255,255,.97) !important; }
html.theme-light .btn-g { background: rgba(0,0,0,.06) !important; color: #241218 !important; }
html.theme-light .cellar-bg { filter: brightness(.92) saturate(.8) !important; }
html.theme-light .bottom-nav { background: rgba(240,232,216,.97) !important; }
html.theme-light select.inp, html.theme-light select { background: rgba(0,0,0,.06) !important; color: #241218 !important; }

.inp:focus{border-color:var(--gold)}.inp::placeholder{color:rgba(245,237,224,.38)}
[contenteditable]:empty:before{content:attr(data-placeholder);color:rgba(245,237,224,.38);pointer-events:none}
[contenteditable]:focus{border-color:var(--gold)!important}
select.inp option{background:var(--bg-deep)}textarea.inp{resize:vertical}
.btn-p{background:var(--wine-light);color:#fff;border:none;padding:12px 26px;font-size:12px;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;font-weight:600;font-family:var(--sans);border-radius:4px;transition:all .2s}
.btn-p:hover{background:#d4284c;transform:translateY(-1px)}
.btn-g{background:rgba(255,255,255,.1);color:var(--cream);border:1.5px solid var(--border-hi);padding:10px 20px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;font-weight:500;font-family:var(--sans);border-radius:4px;transition:all .2s}
.btn-g:hover{border-color:var(--gold);background:var(--gold-faint)}
.btn-danger{background:rgba(184,32,64,.2);color:#ff7090;border:1.5px solid rgba(184,32,64,.5);padding:10px 20px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;font-weight:500;font-family:var(--sans);border-radius:4px;transition:all .2s}
.btn-danger:hover{background:rgba(184,32,64,.4);border-color:#ff4060}
.btn-i{background:rgba(255,255,255,.12);border:1px solid var(--border);color:var(--cream);cursor:pointer;border-radius:4px;transition:all .2s;display:flex;align-items:center;justify-content:center;font-family:var(--sans)}
.btn-i:hover{border-color:var(--gold);background:var(--gold-faint)}
.stars{display:flex;align-items:center;gap:3px}.star{font-size:13px}
.tab-bar{display:flex;background:rgba(26,10,14,.94);border-bottom:1px solid var(--border)}
.tab{flex:1;padding:13px 8px;text-align:center;font-size:10px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .2s;font-family:var(--sans);border-bottom:2px solid transparent}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);background:var(--gold-faint);font-weight:600}
.tab:not(.active){color:var(--cream-faint)}.tab:not(.active):hover{color:var(--cream-dim);background:rgba(255,255,255,.04)}
@keyframes pulse-ring{0%{transform:scale(1);opacity:.8}100%{transform:scale(1.7);opacity:0}}
.voice-pulse::after{content:"";position:absolute;inset:0;border-radius:4px;border:2px solid var(--wine-light);animation:pulse-ring .9s ease-out infinite}
.lang-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border:1px solid var(--border);border-radius:20px;font-size:11px;cursor:pointer;background:rgba(255,255,255,.07);transition:all .2s;font-family:var(--sans)}
.lang-badge:hover{border-color:var(--gold);background:var(--gold-faint)}
.map-embed{border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)}
.article-card{background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;transition:all .2s}
.article-card:hover{border-color:var(--gold-dim);background:rgba(255,255,255,.09)}
.trade-card{border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-card2);transition:all .25s;overflow:hidden}
.trade-card:hover{border-color:var(--gold-dim);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.3)}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:3px}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fadein{animation:fadeIn .35s ease forwards}
.cancel-ai-btn{position:fixed;bottom:24px;right:24px;z-index:500;background:rgba(184,32,64,.92);color:#fff;border:none;padding:10px 20px;border-radius:24px;font-size:12px;font-family:var(--sans);font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;box-shadow:0 4px 20px rgba(0,0,0,.5);letter-spacing:.06em;backdrop-filter:blur(8px)}
.cancel-ai-btn:hover{background:rgba(220,40,80,.95);transform:translateY(-1px)}
.del-confirm{display:none;position:absolute;inset:0;background:rgba(30,10,15,.95);border-radius:var(--radius);flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:10;padding:20px;text-align:center}

/* ═══════════════════════════════════════
   RESPONSIVE & MOBILE OPTIMISATION
═══════════════════════════════════════ */

/* Base touch targets */
button, .btn-p, .btn-g, .btn-i, .btn-danger { min-height: 36px; }

/* Fluid modals */
.modal { width: 100% !important; max-width: 760px; }

/* Bottom nav for mobile */
.bottom-nav {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 110;
  background: rgba(18,6,12,.97);
  border-top: 1px solid var(--border);
  backdrop-filter: blur(12px);
  padding: 6px 0 env(safe-area-inset-bottom, 6px);
}
.bottom-nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  gap: 2px; padding: 6px 4px; cursor: pointer; border: none;
  background: transparent; color: var(--cream-faint);
  font-family: var(--sans); font-size: 9px; letter-spacing: .08em;
  text-transform: uppercase; transition: color .2s; -webkit-tap-highlight-color: transparent;
}
.bottom-nav-item.active { color: var(--gold); }
.bottom-nav-item .nav-icon { font-size: 20px; line-height: 1; }

.mobile-menu-item {
  display: flex; align-items: center; gap: 10px;
  width: 100%; text-align: left; background: none; border: none;
  padding: 16px 20px; font-size: 14px; color: var(--cream-dim);
  font-family: var(--sans); cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,.05);
  transition: background .15s;
}
.mobile-menu-item:active { background: rgba(212,168,76,.08); }

.sort-pill {
  padding: 4px 9px; border-radius: 10px; cursor: pointer;
  white-space: nowrap; transition: all .15s; user-select: none;
}
.sort-pill:hover { background: rgba(212,168,76,.08); color: var(--cream-dim); }
.sort-pill.active { background: var(--gold-faint); color: var(--gold); font-weight: 600; }

.compact-wine-row:hover { background: rgba(212,168,76,.06); }

@media (max-width: 640px) {
  .compact-wine-list { grid-template-columns: 1fr !important; }
  .compact-wine-row { border-right: none !important; }
  .compact-sort-bar { overflow-x: auto; flex-wrap: nowrap !important; }
}



/* Sticky fab (Add Wine on mobile) */
.fab {
  display: none; position: fixed; bottom: 80px; right: 18px; z-index: 120;
  width: 52px; height: 52px; border-radius: 50%;
  background: var(--wine-light); border: none; color: #fff;
  font-size: 24px; cursor: pointer; box-shadow: 0 4px 20px rgba(0,0,0,.5);
  align-items: center; justify-content: center;
  transition: transform .2s, background .2s;
  -webkit-tap-highlight-color: transparent;
}
.fab:active { transform: scale(.93); background: #d4284c; }

/* Card grids */
.wine-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(255px, 1fr));
  gap: 16px; padding: 22px;
}

/* Scrollable tab bar */
.tab-bar { overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.tab-bar::-webkit-scrollbar { display: none; }
.tab { white-space: nowrap; flex-shrink: 0; }

/* Stats bar wrap */
.stats-bar { display: flex; flex-wrap: nowrap; overflow-x: auto; }
.stat-item { flex: 0 0 auto; min-width: 80px; }

/* ── TABLET (≤900px) ── */
@media (max-width: 900px) {
  .modal { max-width: calc(100vw - 24px) !important; }
  .landing-right { width: 360px !important; }
}

/* ── MOBILE (≤640px) ── */
@media (max-width: 640px) {
  /* Landing: stack vertically */
  .landing-wrap { flex-direction: column !important; }
  .landing-left { min-height: 280px !important; padding: 32px 24px !important; flex: none !important; }
  .landing-left .bottle-row { display: none !important; }
  .landing-left .quote { font-size: 15px !important; }
  .landing-right { width: 100% !important; padding: 28px 22px !important; }

  /* Navbar: hide desktop action row, show mobile lang+notif+hamburger */
  .navbar-desktop-actions { display: none !important; }
  .navbar-mobile-actions { display: flex !important; }

  /* Show bottom nav + FAB */
  .bottom-nav { display: flex !important; }
  .fab { display: flex !important; }

  /* Content padding for bottom nav */
  .app-layer > div:last-child { padding-bottom: 80px !important; }

  /* Wine grid: 1 column */
  .wine-grid {
    grid-template-columns: 1fr !important;
    gap: 10px; padding: 12px !important;
  }

  /* Modals: full screen on mobile */
  .modal-bg { padding: 0 !important; align-items: flex-end !important; }
  .modal {
    border-radius: 16px 16px 0 0 !important;
    max-height: 92vh !important;
    max-width: 100% !important;
    width: 100% !important;
  }

  /* Detail modal header: stack */
  .detail-header { flex-direction: column !important; }
  .detail-side { width: 100% !important; flex-direction: row !important; padding: 16px !important; height: auto !important; }

  /* Sticky close bar always visible at top of scrollable modal */
  .detail-sticky-close { padding: 12px 14px 0 !important; }

  /* Action bar: wrap */
  .action-bar { flex-wrap: wrap !important; gap: 6px !important; }
  .action-bar button { flex: 1 1 calc(50% - 6px) !important; font-size: 10px !important; padding: 9px 8px !important; }

  /* Stats bar: 2x2 grid */
  /* Stats bar: compact single row, icon-only labels, small numbers */
  .stats-bar { display: flex !important; grid-template-columns: none !important; }
  .stat-item { flex: 1 !important; padding: 7px 2px !important; border-right: 1px solid var(--border) !important; border-bottom: none !important; }
  .stat-item:last-child { border-right: none !important; }
  .stat-label-full { display: none !important; }
  .stat-label-mobile { display: block !important; }
  .stat-value { font-size: 15px !important; }

  /* Navbar padding */
  .navbar-inner { padding: 10px 14px !important; }

  /* Map iframe: shorter */
  .map-embed { height: 160px !important; }

  /* Trade cards: full width */
  .trade-cards-grid { grid-template-columns: 1fr !important; }

  /* Region search: full width */
  .region-search-row { flex-direction: column !important; }
  .region-search-row input { width: 100% !important; }

  /* Add wine modal steps */
  .step-tabs .tab { font-size: 9px !important; padding: 10px 4px !important; }

  /* Travel grid */
  .travel-feature-grid { grid-template-columns: repeat(3, 1fr) !important; }
  .travel-regions-grid { grid-template-columns: 1fr !important; }

  /* Typography scale down */
  .serif[style*="font-size:28px"] { font-size: 22px !important; }
  .serif[style*="font-size:26px"] { font-size: 20px !important; }
}

/* ── TINY (≤380px) ── */
@media (max-width: 380px) {
  .wine-grid { padding: 8px !important; gap: 8px !important; }
  .bottom-nav-item .nav-icon { font-size: 18px; }
  .bottom-nav-item { font-size: 8px; }
  .travel-feature-grid { grid-template-columns: repeat(2, 1fr) !important; }
}

/* PWA / safe areas */
@supports (padding-bottom: env(safe-area-inset-bottom)) {
  .bottom-nav { padding-bottom: max(6px, env(safe-area-inset-bottom)); }
}


/* ── Split panel layout (desktop only) ── */
.split-panel {
  display: flex;
  height: calc(100vh - var(--header-h, 140px));
  overflow: hidden;
}
.split-panel .list-pane {
  width: 50%;
  overflow-y: auto;
  border-right: 1px solid var(--border);
  flex-shrink: 0;
}
.split-panel .detail-pane {
  width: 50%;
  overflow-y: auto;
  background: var(--bg-card);
  flex-shrink: 0;
  position: relative;
}
.split-panel .detail-pane .modal {
  /* Override modal styles when inside split pane */
  position: static !important;
  max-width: 100% !important;
  width: 100% !important;
  margin: 0 !important;
  border-radius: 0 !important;
  border: none !important;
  box-shadow: none !important;
  min-height: 100%;
  background: var(--bg-card) !important;
}

.cmp-wrap{max-width:1000px;margin:0 auto;padding:20px 18px 60px}

t wines in the appellation, favouring finesse over power.", "aromas": ["Violets", "Black Cherry", "Cedar", "Rose"], "flavors": ["Cassis", "Dark Plum", "Fine Tannin", "Tobacco"], "body": "Medium-Full", "finish": "Long", "occasion": "Dinner Party", "notes": "", "tradeable":false, "bc": "#7a2030", "lc": "#c8a040", "articles": [{"title": "Margaux 2022: The Vintage of Finesse", "publication": "Decanter", "score": 91, "year": 2024, "snippet": "D'Issan 2022 is characteristic of the estate at its best — violet-scented, silky, and with the perfumed elegance that makes Margaux unique."}], "labelImg": "src/label_01.svg"}, {"id": 211, "name": "Château Giscours Margaux", "vintage": 2022, "mode": "consumed", "rating": 90, "region": "Margaux, Bordeaux, France", "grapes": ["Cabernet Sauvignon", "Merlot", "Cabernet Franc"], "story": "Château Giscours is one of Margaux's largest and most historic estates, recently returned to form after years of inconsistency. The 2022 vintage is their most complete effort in years.", "aromas": ["Black Cherry", "Violet", "Cassis", "Cedar"], "flavors": ["Dark Berry", "Plum", "Tobacco", "Graphite"], "body": "Full", "finish": "Long", "occasion": "Dinner Party", "notes": "", "tradeable":false, "bc": "#6a1828", "lc": "#b89030", "articles": [{"title": "Giscours 2022: A Return to Former Glory", "publication": "Wine Spectator", "score": 90, "year": 2024, "snippet": "Giscours has quietly rebuilt its reputation. The 2022 is the most convincing evidence yet — rich, aromatic, and genuinely Margaux."}], "labelImg": "src/label_01.svg"}, {"id": 212, "name": "Château Cos d'Estournel Saint-Estèphe", "vintage": 2022, "mode": "consumed", "rating": 95, "region": "Saint-Estèphe, Bordeaux, France", "grapes": ["Cabernet Sauvignon", "Merlot"], "story": "The iconic pagoda-topped Cos d'Estournel is Saint-Estèphe's most celebrated wine, famed for extraordinary ageing potential. The 2022 vintage is widely regarded as one of their greatest releases of the century.", "aromas": [" function formatVolume(ml){
  if(ml<1000) return ml+'mL';
  return (ml/1000)+'L';
}

function bottleSizeName(ml){
  const s = BOTTLE_SIZES.find(b=>b.ml===ml);
  return s ? s.name : 'Standard Bottle';
}

function totalEquivBottles(inventory){
  return inventory.reduce((sum,inv)=>{
    const s = BOTTLE_SIZES.find(b=>b.ml===(inv.ml||750));
    return sum + (inv.qty||1) * (s?s.eq:1);
  }, 0);
}

// ── Fuzzy region lookup ──────────────────────────────────────────
// AI-generated region strings vary in phrasing ("Montepulciano, Tuscany, Italy"
// vs "Tuscany, Italy"). Try an exact match first, then fall back to matching
// on any comma-separated segment, so wines still get roughly placed on the map
// even when the AI's exact wording doesn't match a hardcoded key.
function getRegionCoords(region){
  if(!region) return null;
  if(REGION_COORDS[region]) return REGION_COORDS[region];
  const parts=region.split(",").map(s=>s.trim());
  // Try matching from the most specific (full string minus first segment) to least specific (last segment/country)
  for(let i=1;i<parts.length;i++){
    const candidate=parts.slice(i).join(", ");
    if(REGION_COORDS[candidate]) return REGION_COORDS[candidate];
  }
  // Try matching any known key that contains the wine's country/region as a substring
  const lastPart=parts[parts.length-1];
  for(const key in REGION_COORDS){
    if(key.endsWith(lastPart)) return REGION_COORDS[key];
  }
  return null;
}

    <rect x="19" y="10" width="12" height="8" rx="1" fill="${hi}" opacity=".4"/>

function starsHtml(r){
  const s=Math.round(r/20);
  let h=`<div class="stars">`;
  for(let i=1;i<=5;i++)h+=`<span class="star" style="color:${i<=s?"var(--gold)":"rgba(212,168,76,.2)"}">★</span>`;
  return h+`<span style="font-size:11px;color:var(--cream-faint);margin-left:6px">${r}/100</span></div>`;
}

// ═══ CSV IMPORT ═══
let csvImporting=false;
let csvProgress=0;
let csvTotal=0;

function parseCsv(text){
  const lines=text.trim().split("\n");
  const header=lines[0].split(",").map(h=>h.trim().toLowerCase());
  const ni=header.indexOf("name"); const yi=header.indexOf("year"); const mi=header.indexOf("mode");
  const ri=header.indexOf("rating"); const nti=header.indexOf("notes");
  return lines.slice(1).map((line,idx)=>{
    // Handle commas inside quoted fields
    const cols=[]; let cur=""; let inQ=false;
    for(const ch of line){if(ch==='"'){inQ=!inQ;}else if(ch===','&&!inQ){cols.push(cur.trim());cur="";}else{cur+=ch;}}
    cols.push(cur.trim());
    return{
      id:300+idx,
      name:cols[ni]||"Unknown",
      vintage:parseInt(cols[yi])||2020,
      mode:(cols[mi]||"cellar").trim(),
      rating:cols[ri]?parseInt(cols[ri]):null,
      notes:cols[nti]||"",
    };
  }).filter(w=>w.name&&w.name!=="Unknown");
}

async function enrichAndImport(rawWines){
  csvImporting=true; csvProgress=0; csvTotal=rawWines.length;
  render();
  const enriched=[];
  // Process in batches of 3 to show progress
  for(let i=0;i<rawWines.length;i++){
    const w=rawWines[i];
    csvProgress=i;
    render();
    let newWine;
    try{
      const ln=LANGS.find(l=>l.code===S.lang)?.native||"English";
      const text=await callAI(
        `Wine: "${w.name}" ${w.vintage}. Language: ${ln}. Return JSON: {"name":"${w.name}","producer":"...","region":"...","country":"...","grapes":["..."],"style":"Red","story":"2 sentences","aromas":["...","...","...","..."],"flavors":["...","...","...","..."],"body":"Full","finish":"Long","bc":"#hex6","lc":"#hex6","drinkWindowFrom":2024,"drinkWindowTo":2030}`
      );
      const p=JSON.parse(text);
      newWine={...w,...p,
        id:w.id||(Date.now()+i),
        aromas:p.aromas||[],flavors:p.flavors||[],
        bc:p.bc||"#8b2240",lc:p.lc||"#d4a84c",
        articles:[],labelImg:null,tradeable:false,
        rating:w.rating||p.rating||90,
        occasion:"",
        inventory:w.inventory||[{ml:750,qty:1}],
      };
      // Contribute to shared catalog — fire and forget
      apiRequest('/api/catalog/contribute',{method:'POST',body:JSON.stringify({
        enrichedData:{...p, name:p.name||w.name, vintage:w.vintage}, sourceType:'csv_import'
      })}).catch(()=>{});
    }catch(e){
      newWine={...w,id:w.id||(Date.now()+i),region:"",grapes:[],story:"",aromas:[],flavors:[],
        body:"Full",finish:"Long",bc:"#8b2240",lc:"#d4a84c",
        articles:[],labelImg:null,tradeable:false,
        rating:w.rating||90,occasion:"",
        inventory:w.inventory||[{ml:750,qty:1}],
      };
    }
    enriched.push(newWine);
    // Sync to server immediately so a reload doesn't lose progress —
    // non-blocking, doesn't slow down the import loop.
    if(S.user){
      syncWineToServer(newWine).then(serverId=>{
        if(serverId){ newWine.id=serverId; render(); }
      });
    }
    await new Promise(r=>setTimeout(r,200));
  }
  csvProgress=rawWines.length;
  S.wines=[...enriched,...S.wines];
  csvImporting=false; csvProgress=0; csvTotal=0;
  render();
}

// ── AI Abort Controller ──
let _aiCtrl = null;
function cancelAI(){
  if(_aiCtrl){ _aiCtrl.abort(); _aiCtrl=null; }
  S.aiLoading=false; S.travelLoading=false; S.drinkingWindowLoading=false;
  S.pairingLoading=false; S.articlesLoading=false; S.labelLoading=false;
  S.itineraryLoading=false; sommelierLoading=false;
  render();
}

async function callAI(prompt,sys,mt){
  mt=mt||800;
  const maxRetries=3;
  for(let attempt=0;attempt<maxRetries;attempt++){
    _aiCtrl=new AbortController();
    const _timeout=setTimeout(()=>{if(_aiCtrl)_aiCtrl.abort();},15000);
    try{
      const res=await fetch("/api/anthropic",{
        method:"POST",signal:_aiCtrl.signal,headers:{"Content-Type":"application/json","Authorization":"Bearer "+(S.user&&S.user.token||"")},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:mt,
          system:sys||"You are a master sommelier. Return ONLY valid JSON, no markdown, no preamble.",
          messages:[{role:"user",content:prompt}]})
      });
      clearTimeout(_timeout);
      if(res.status===429||res.status===529){
        // Rate limited or overloaded — back off and retry instead of stalling silently
        const waitMs=1000*Math.pow(2,attempt);
        await new Promise(r=>setTimeout(r,waitMs));
        continue;
      }
      const d=await res.json();
      return((d.content&&d.content[0]&&d.content[0].text)||"{}").replace(/```json|```/g,"").trim();
    }catch(e){
      clearTimeout(_timeout);
      if(attempt===maxRetries-1) throw e;
      await new Promise(r=>setTimeout(r,1000*Math.pow(2,attempt)));
    }
  }
  return "{}";
}

async function callAIImg(prompt,b64,mt){

            {type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},
            {type:"text",text:prompt}
          ]}]})

}

// ═══ VOICE ═══
let recognition=null;
function startVoice(target){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert("Voice input requires Chrome browser.");return;}
  if(recognition)recognition.stop();
  const langMap={en:"en-US",es:"es-ES",fr:"fr-FR",it:"it-IT",de:"de-DE",zh:"zh-CN",ja:"ja-JP",tl:"tl-PH",ko:"ko-KR"};
  recognition=new SR();
  recognition.lang=langMap[S.lang]||"en-US";
  recognition.continuous=false;recognition.interimResults=true;
  S.voiceActive=true;S.voiceTarget=target;S.voiceTranscript="";render();
  recognition.onresult=e=>{
    const t=Array.from(e.results).map(r=>r[0].transcript).join("");
    S.voiceTranscript=t;
    if(e.results[e.results.length-1].isFinal){
      if(target==="notes")S.nw.notes=(S.nw.notes?S.nw.notes+" ":"")+t;
      if(target==="search")S.wsearch=t;
      if(target==="editnotes")S.selEditNotes=(S.selEditNotes?S.selEditNotes+" ":"")+t;
      S.voiceActive=false;S.voiceTarget=null;S.voiceTranscript="";
    }
    render();
  };
  recognition.onerror=()=>{S.voiceActive=false;render();};
  recognition.onend=()=>{if(S.voiceActive){S.voiceActive=false;render();}};
  recognition.start();
}
function stopVoice(){if(recognition)recognition.stop();S.voiceActive=false;render();}

  // Scanned labels are stored as raw base64 — add the data URI prefix so <img> tags can render them.
  // Pre-loaded demo/CSV wines and venue wines already use a path (e.g. "src/label_x.svg") and are left as-is.
  const rawLabel = S.labelImg;
  const finalLabelImg = rawLabel && !rawLabel.startsWith("data:") && !rawLabel.startsWith("src/") && !rawLabel.startsWith("http")
    ? "data:image/jpeg;base64,"+rawLabel
    : rawLabel;
  const newWine={
    id:Date.now(),name:S.wsearch||"Unknown Wine",
    vintage:parseInt(S.nw.vintage)||2024,mode:S.nw.mode,rating:91,
    region:a.region||"",grapes:a.grapes||[],story:a.story||"",
    aromas:S.nw.aromas||a.aromas||[],flavors:a.flavors||[],
    body:S.nw.body,finish:S.nw.finish,occasion:S.nw.occasion,notes:S.nw.notes,
    bc:"#8b2240",lc:"#d4a84c",tradeable:S.nw.tradeable,
    labelImg:finalLabelImg,articles:S.articles||[],
    inventory:S.nw.inventory||[{ml:750,qty:1}],
    purchaseType:S.nw.purchaseType||"bottle",
    pricePaid:S.nw.pricePaid?parseFloat(S.nw.pricePaid):null,
    priceMl:parseInt(S.nw.priceMl)||750,
    priceCurrency:S.nw.priceCurrency||"USD",
  };
  S.wines=[newWine,...S.wines];
  S.showAdd=false;S.step=1;S.aiData=null;S.wsearch="";
  S.labelImg=null;S.articles=[];
  S.nw={mode:"cellar",aromas:[],body:"Full",finish:"Long",occasion:"",notes:"",vintage:2024,tradeable:false,inventory:[{ml:750,qty:1}],purchaseType:"bottle",pricePaid:"",priceMl:750,priceCurrency:"USD"};
  render();
  // Sync to server if logged in — non-blocking
  if(S.user){
    syncWineToServer(newWine).then(serverId=>{
      if(serverId){
        const w=S.wines.find(x=>x.id===newWine.id);
        if(w) w.id=serverId;
        render();
      }
    });
  }
}

function deleteWine(id){
  S.wines=S.wines.filter(w=>w.id!==id);
  S.sel=null;S.deleteConfirmId=null;S.editingNotes=false;render();
  if(S.user) deleteWineFromServer(id);
}

function saveNotes(){
  if(S.sel){
    const w=S.wines.find(x=>x.id===S.sel.id);
    if(w){w.notes=S.selEditNotes;S.sel={...S.sel,notes:S.selEditNotes};}
    if(S.user && w) updateWineOnServer(w.id, w);
  }
  S.editingNotes=false;render();
}

function toggleAroma(a){
  const arr=S.nw.aromas||[];
  S.nw.aromas=arr.includes(a)?arr.filter(x=>x!==a):[...arr,a];
  render();
}

function on(id,fn){const e=document.getElementById(id);if(e)e.onclick=fn;}
function getLang(){return LANGS.find(l=>l.code===S.lang)||LANGS[0];}
function getMapUrl(region){
  const c=getRegionCoords(region);
  if(c){const[la,ln]=c;return`https://www.openstreetmap.org/export/embed.html?bbox=${ln-1.2},${la-1},${ln+1.2},${la+1}&layer=mapnik&marker=${la},${ln}`;}
  return`https://www.openstreetmap.org/export/embed.html?bbox=-10,35,20,55&layer=mapnik`;
}
function mapEmbed(region,h){
  h=h||200;
  return`<div class="map-embed" style="height:${h}px;margin-top:10px">
    <iframe src="${getMapUrl(region)}" width="100%" height="${h}" style="border:none;filter:sepia(.4) saturate(.8) hue-rotate(340deg) brightness(.85)" loading="lazy"></iframe>
  </div>
  <div style="font-size:10px;color:var(--cream-faint);margin-top:5px;letter-spacing:.07em">📍 ${region} · via OpenStreetMap</div>`;
}
function voiceBtn(target,extra){

  return`<button id="voice-${target}" class="btn-i" style="width:38px;height:38px;font-size:15px;position:relative;flex-shrink:0;${active?"background:rgba(184,32,64,.3);border-color:var(--wine-light)":""}${extra||""}" title="Voice input">

  </button>`;
}

  S.travelLoading = true; S.travelData = null; S.travelTab = "overview"; render();
  try {
    const ln = LANGS.find(l=>l.code===S.lang)?.native || "English";
    const text = await callAI(
      `Wine region travel guide for "${wine.region}" (wine: ${wine.name}). Language: ${ln}.
Return JSON: {
  "region": "...",
  "country": "...",
  "overview": "3 sentences about visiting this wine region as a traveler",
  "bestTime": "Best months to visit and why",
  "gettingThere": {
    "fromUSA": "Nearest major airport and typical flight time from USA",
    "fromEurope": "Train or drive options from major European hubs",
    "localTransport": "How to get around once there (car hire, taxi, shuttle)"
  },
  "whereToStay": [
    {"name": "Luxury hotel name", "type": "Luxury", "description": "1 sentence", "priceRange": "$$$"},
    {"name": "Mid-range option", "type": "Mid-range", "description": "1 sentence", "priceRange": "$$"},
    {"name": "Charming B&B or gite", "type": "Boutique", "description": "1 sentence", "priceRange": "$"}
  ],
  "wineryContact": {
    "address": "Winery address for ${wine.name}",
    "phone": "Typical phone format for country",
    "email": "info@winery-domain.com (typical format)",
    "visitHours": "Typical visiting hours",
    "bookingTip": "Tip for booking a visit (appointments, best season, etc)"
  },
  "restaurants": [
    {"name": "Restaurant name", "cuisine": "Local cuisine type", "description": "1 sentence", "priceRange": "$$"},
    {"name": "Another restaurant", "cuisine": "Wine-paired cuisine", "description": "1 sentence", "priceRange": "$$$"}
  ],
  "experiences": [
    {"title": "Harvest experience title", "description": "1 sentence"},
    {"title": "Tasting room or tour title", "description": "1 sentence"},
    {"title": "Cultural or scenic activity", "description": "1 sentence"}
  ],
  "flightTip": "Practical tip for finding flights to nearest airport",
  "nearestAirport": "Airport code and name",
  "drivingFromAirport": "Approx drive time from nearest airport"
}`,
      "You are a luxury travel expert specialising in wine tourism. Return ONLY valid JSON.",

    S.travelData = JSON.parse(text);

  },

function renderInvitationCard(ev, style){
  const st = INV_STYLES[style||"classic"];
  const accent  = ev.customAccent || st.accent;
  const bg      = ev.customBg     || st.bg;
  const bg2     = ev.customAccent ? `${ev.customAccent}18` : st.bg2;
  const bgImage = ev.invBgImage   || ev.inv_bg_image || "";
  const dateStr = ev.eventDate||ev.event_date
    ? new Date(ev.eventDate||ev.event_date).toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"})
    : "";
  const bgStyle = bgImage
    ? `background:${bg};background-image:url('${bgImage}');background-size:cover;background-position:center`
    : `background:${bg}`;
  return `<div style="${bgStyle};border:1.5px solid ${accent};border-radius:10px;padding:28px 26px;max-width:420px;margin:0 auto;position:relative;overflow:hidden">
    ${bgImage?`<div style="position:absolute;inset:0;background:rgba(0,0,0,.55);border-radius:10px"></div>`:""}
    <div style="position:relative;z-index:1">
    <div style="position:absolute;top:-28px;left:-26px;right:-26px;height:3px;background:${accent};opacity:.8"></div>
    <div style="text-align:center;margin-bottom:18px">
      <div style="font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:${accent};margin-bottom:10px;font-family:${st.bodyFont}">You are cordially invited</div>
      <div style="font-size:24px;font-weight:400;color:#f5ede0;font-family:${st.titleFont};line-height:1.3;margin-bottom:6px">${ev.title}</div>
      ${dateStr?`<div style="font-size:13px;color:rgba(245,237,224,.7);font-family:${st.bodyFont};margin-bottom:4px">📅 ${dateStr}</div>`:""}
      ${(ev.venueName||ev.venue_name)?`<div style="font-size:13px;color:rgba(245,237,224,.7);font-family:${st.bodyFont}">📍 ${ev.venueName||ev.venue_name}</div>`:""}
    </div>
    ${(ev.invitationText||ev.invitation_text||ev.manualInvText)?`
    <div style="background:${bg2};border-left:2px solid ${accent};padding:12px 14px;border-radius:0 6px 6px 0;margin-bottom:16px">
      <div style="font-size:12.5px;color:rgba(245,237,224,.85);font-family:${st.bodyFont};line-height:1.75;font-style:italic">"${ev.invitationText||ev.invitation_text||ev.manualInvText}"</div>
    </div>`:""}
    ${ev.description?`<div style="font-size:12px;color:rgba(245,237,224,.55);font-family:${st.bodyFont};line-height:1.7;margin-bottom:16px;text-align:center">${ev.description}</div>`:""}
    <div style="text-align:center;padding-top:14px;border-top:1px solid rgba(245,237,224,.1)">
      <div style="font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:${accent};margin-bottom:8px;font-family:${st.bodyFont}">RSVP</div>
      <div style="font-size:11px;color:rgba(245,237,224,.4);font-family:${st.bodyFont}">Presented by CellarTrek</div>
    </div>
    <div style="position:absolute;bottom:-28px;left:-26px;right:-26px;height:3px;background:${accent};opacity:.4"></div>
    </div>
  </div>`;
}

async function createEvent(){
  const d=S.createEventDraft;
  if(!d.title.trim()){ alert("Event title is required."); return; }
  if(!S.activeGroup) return;
  S.eventInviteLoading=true; render();
  try{
    let invText="", invDesign="";
    try{
      const styleDesc = INV_STYLES[d.invStyle||"classic"].desc;
      // Use manual text directly if written, otherwise AI generates
      if(d.manualInvText&&d.manualInvText.trim()){
        invText=d.manualInvText.trim();
        invDesign=styleDesc;
      } else {
        const aiPrompt=`Write a formal wine event invitation for "${d.title}" on ${d.eventDate||"a special evening"} at ${d.venueName||"an exclusive venue"}. Occasion: ${d.description||"an intimate wine tasting"}. Style: ${styleDesc}. Return JSON: {"invitationText":"3 elegant sentences of formal invitation copy — evocative, warm, specific to a wine event. Do not include the event name, date or venue — those appear separately."}`;
        const raw=await callAI(aiPrompt,"You are an award-winning event designer specialising in luxury wine events. Return ONLY valid JSON.",350);
        const parsed=JSON.parse(raw);
        invText=parsed.invitationText||"";
        invDesign=styleDesc;
      }
    }catch(e){ /* AI failed silently */ }

    const ev = await apiRequest("/api/social/groups/"+S.activeGroup.id+"/events",{
      method:"POST",
      body:JSON.stringify({...d,invitationText:invText,invitationDesign:invDesign})
    });
    S.groupEvents=[...S.groupEvents,ev];
    S.showCreateEvent=false;
    S.eventInviteLoading=false;
    S.invPreview={...d, invitationText:invText, id:ev.id, shareable_token:ev.shareable_token};
    S.createEventDraft={title:"",description:"",eventDate:"",venueName:"",venueAddress:"",pairingMenu:[],invStyle:"classic",manualInvText:"",customAccent:"",customBg:"",invBgImage:""};
    render();
  }catch(e){ S.eventInviteLoading=false; alert("Could not create event: "+e.message); }
}

async function updateEvent(){
  const d=S.createEventDraft;
  const ev=S.editingEvent;
  if(!d.title.trim()){ alert("Event title is required."); return; }
  if(!ev) return;
  S.eventInviteLoading=true; render();
  try{
    const invText=d.manualInvText||ev.invitation_text||"";
    const invDesign=d.invStyle?INV_STYLES[d.invStyle].desc:ev.invitation_design||"";
    const updated = await apiRequest("/api/social/events/"+ev.id,{
      method:"PUT",
      body:JSON.stringify({
        title:d.title, description:d.description, eventDate:d.eventDate,
        venueName:d.venueName, venueAddress:d.venueAddress,
        pairingMenu:d.pairingMenu, invitationText:invText, invitationDesign:invDesign,
      })
    });
    // Update in groupEvents array
    S.groupEvents=S.groupEvents.map(e=>e.id===ev.id?{...e,...updated}:e);
    S.showCreateEvent=false;
    S.editingEvent=null;
    S.eventInviteLoading=false;
    S.createEventDraft={title:"",description:"",eventDate:"",venueName:"",venueAddress:"",pairingMenu:[],invStyle:"classic",manualInvText:"",customAccent:"",customBg:"",invBgImage:""};
    render();
  }catch(e){ S.eventInviteLoading=false; alert("Could not update event: "+e.message); render(); }
}

async function deleteEvent(eventId){
  if(!confirm("Delete this event? This cannot be undone.")) return;
  try{
    await apiRequest("/api/social/events/"+eventId,{method:"DELETE"});
    S.groupEvents=S.groupEvents.filter(e=>e.id!==eventId);
    render();
  }catch(e){ alert("Could not delete event: "+e.message); }
}

async function createTrip(){
  const d=S.createTripDraft;

async function loadShopItems(category){
  S.shopLoading=true; render();
  try{
    const url="/api/shop/items"+(category&&category!=="all"?"?category="+category:"");
    const [items, sellers] = await Promise.all([
      apiRequest(url),
      apiRequest("/api/shop/sellers"),
    ]);
    S.shopItems=items||[];
    S.shopSellers=sellers||[];
  }catch(e){ console.error("loadShopItems:", e.message); }
  S.shopLoading=false; render();
}

async function loadMyOrders(){
  S.myOrdersLoading=true; render();
  try{ S.myOrders=await apiRequest("/api/shop/orders/mine")||[]; }
  catch(e){ console.error("loadMyOrders:", e.message); }
  S.myOrdersLoading=false; render();
}

async function placeShopOrder(){
  if(!S.shopItem) return;
  const d=S.shopOrderDraft;
  if(!d.userName.trim()||!d.userEmail.trim()){ alert("Please enter your name and email so the seller can contact you."); return; }
  S.shopOrderPlacing=true; render();
  try{
    const result=await apiRequest("/api/shop/orders",{
      method:"POST",
      body:JSON.stringify({
        itemId:S.shopItem.id,
        qty:d.qty,
        userName:d.userName,
        userEmail:d.userEmail,
        userPhone:d.userPhone,
        deliveryNotes:d.deliveryNotes,
      })
    });
    S.shopOrderDone=result;
    S.shopOrderPlacing=false;
    render();
  }catch(e){
    S.shopOrderPlacing=false;
    alert("Could not place order: "+e.message);
    render();
  }
}

const SHOP_CATEGORIES=[
  ["all","All"],["venue","🏛 By Venue"],["wine","🍷 Wine"],["accessory","🎁 Accessories"],
  ["experience","✨ Experiences"],["travel","✈️ Travel"],["promotion","🏷 Promotions"],

function shopCurrencyFormat(price, currency){
  if(price==null) return "Contact for price";
  const symbols={"USD":"$","EUR":"€","GBP":"£","HKD":"HK$","JPY":"¥","CAD":"CA$","AUD":"A$"};
  return (symbols[currency]||currency+" ")+Number(price).toFixed(2);
}

function eduGetProgress(pathId, topicId){
  return S.eduProgress[pathId+':'+topicId]||{};
}
function eduPathComplete(pathId){
  const path=EDU_CURRICULUM.find(p=>p.id===pathId);
  if(!path) return false;
  return path.topics.every(t=>eduGetProgress(pathId,t.id).completed);
}
function eduPathLocked(path){
  if(!path.locked||!path.lockAfter) return false;
  return !eduPathComplete(path.lockAfter);
}
function eduTopicLocked(path, topicIdx){
  if(eduPathLocked(path)) return true;
  if(topicIdx===0) return false;
  return !eduGetProgress(path.id, path.topics[topicIdx-1].id).completed;
}
function eduPathProgress(pathId){
  const path=EDU_CURRICULUM.find(p=>p.id===pathId);
  if(!path) return {done:0,total:0};
  const done=path.topics.filter(t=>eduGetProgress(pathId,t.id).completed).length;
  return {done,total:path.topics.length};
}

async function sendEduExplore(question){
  if(!question||S.eduExploreLoading) return;
  const userMsg={role:'user',content:question};
  S.eduExploreHistory=[...S.eduExploreHistory,userMsg];
  S.eduExploreLoading=true; render();
  // Scroll to bottom
  setTimeout(()=>{ const el=document.getElementById('edu-explore-msgs'); if(el)el.scrollTop=el.scrollHeight; },50);
  try{
    const history=S.eduExploreHistory.slice(-6).map(m=>({role:m.role,content:m.content}));
    const data=await apiRequest('/api/education/explore',{
      method:'POST',
      body:JSON.stringify({question,history:history.slice(0,-1)})
    });
    S.eduExploreHistory=[...S.eduExploreHistory,{role:'assistant',content:data.answer}];
  }catch(e){
    S.eduExploreHistory=[...S.eduExploreHistory,{role:'assistant',content:'Sorry, I could not connect to the AI educator. Please try again.'}];
  }
  S.eduExploreLoading=false; render();
  setTimeout(()=>{ const el=document.getElementById('edu-explore-msgs'); if(el)el.scrollTop=el.scrollHeight; },50);
}

async function loadEduProgress(){
  try{
    const rows=await apiRequest('/api/education/progress');
    const map={};
    rows.forEach(r=>{ map[r.path_id+':'+r.topic_id]=r; });
    S.eduProgress=map; render();
  }catch(e){ console.error('loadEduProgress:',e.message); }
}

async function loadEduContent(pathId, topicId, format){
  S.eduLoading=true; S.eduContent=null; render();
  try{
    const data=await apiRequest(`/api/education/content/${pathId}/${topicId}/${format}`);
    S.eduContent=data; S.eduLoading=false;
    S.eduFlashIdx=0; S.eduFlashRevealed=false;
    S.eduQuizAnswers={}; S.eduQuizSubmitted=false;
    render();
  }catch(e){
    S.eduLoading=false;
    S.eduContent={error:e.message};
    render();
  }
}

async function saveEduProgress(pathId, topicId, completed, quizScore){
  try{
    await apiRequest('/api/education/progress',{method:'POST',body:JSON.stringify({pathId,topicId,completed,quizScore})});
    const key=pathId+':'+topicId;
    const prev=S.eduProgress[key]||{};
    S.eduProgress[key]={...prev,path_id:pathId,topic_id:topicId,completed:completed||prev.completed,
      quiz_score:quizScore>=(prev.quiz_score||0)?quizScore:prev.quiz_score};
    render();
  }catch(e){ console.error('saveEduProgress:',e.message); }
}

function renderEduPathOverview(path){

  return`
    <div style="margin-bottom:16px">

      <div style="background:rgba(212,168,76,.1);height:3px;border-radius:2px;margin-bottom:16px">

      </div>
    </div>
    <div style="display:grid;gap:6px">
      ${path.topics.map((topic,idx)=>{
        const prog=eduGetProgress(path.id,topic.id);
        const locked=eduTopicLocked(path,idx);
        const done=prog.completed;
        const current=!done&&!locked&&(idx===0||eduGetProgress(path.id,path.topics[idx-1].id).completed);
        return`<div class="edu-topic-row" data-path="${path.id}" data-topic="${topic.id}" data-locked="${locked}"

          <div style="width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;font-weight:600;background:${done?'rgba(127,174,106,.2)':current?'var(--gold-faint)':'rgba(255,255,255,.06)'};color:${done?'#7fae6a':current?'var(--gold-light)':'var(--cream-faint)'}">
            ${done?'✓':locked?'🔒':(idx+1)}
          </div>
          <div style="flex:1;font-size:12px;color:${current?'var(--cream)':'var(--cream-dim)'};font-weight:${current?500:400}">${topic.label}</div>
          <div style="display:flex;gap:4px">
            ${topic.formats.map(f=>`<span style="font-size:8px;padding:2px 7px;border-radius:8px;background:${f==='lesson'?'rgba(122,184,212,.12)':f==='flashcards'?'rgba(200,168,120,.12)':'rgba(144,200,144,.12)'};color:${f==='lesson'?'#7ab8d4':f==='flashcards'?'#c8a878':'#90d490'}">${f==='lesson'?'Lesson':f==='flashcards'?'Cards':'Quiz'}${f==='quiz'&&prog.quiz_score!=null?' '+prog.quiz_score+'%':''}</span>`).join('')}

}

  return`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">

        <div style="font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--cream-faint)">${path.label}</div>
        <div class="serif" style="font-size:18px;color:var(--cream)">${topic.label}</div>

    <div style="display:flex;gap:6px;margin-bottom:16px">

    <div style="max-width:600px">

function renderEduQuiz(pathId, topic){
  const c=S.eduContent;
  if(!c||!c.questions||!c.questions.length) return `<div style="color:var(--cream-faint);font-size:13px">No quiz available</div>`;
  const submitted=S.eduQuizSubmitted;
  const score=submitted?Math.round(Object.entries(S.eduQuizAnswers).filter(([i,a])=>a===c.questions[i].correct).length/c.questions.length*100):null;

  return`
    <div style="max-width:560px">
      ${submitted?`
        <div style="padding:14px 18px;border-radius:8px;margin-bottom:16px;background:${score>=60?'rgba(127,174,106,.1)':'rgba(184,80,80,.1)'};border:1px solid ${score>=60?'rgba(127,174,106,.3)':'rgba(184,80,80,.3)'}">
          <div style="font-size:16px;font-weight:600;color:${score>=60?'#7fae6a':'#e09090'}">${score}% — ${score>=60?'Passed ✓':'Try again'}</div>
          <div style="font-size:12px;color:var(--cream-faint);margin-top:3px">${score>=60?'Topic marked complete!':'Need 60% to pass. Review the lesson and retry.'}</div>
        </div>`:``}

      ${c.questions.map((q,qi)=>{
        const answered=S.eduQuizAnswers[qi]!=null;
        const correct=q.correct;
        return`<div style="margin-bottom:14px;padding:14px 16px;background:rgba(255,255,255,.04);border:0.5px solid rgba(255,255,255,.08);border-radius:8px">
          <div style="font-size:13px;font-weight:500;color:var(--cream);margin-bottom:10px">${qi+1}. ${q.question}</div>
          ${q.options.map((opt,oi)=>{
            let bg='rgba(255,255,255,.04)',border='rgba(255,255,255,.08)',color='var(--cream-dim)';
            if(submitted){
              if(oi===correct){bg='rgba(127,174,106,.12)';border='rgba(127,174,106,.35)';color='#7fae6a';}
              else if(oi===S.eduQuizAnswers[qi]&&oi!==correct){bg='rgba(184,80,80,.1)';border='rgba(184,80,80,.3)';color='#e09090';}
            } else if(S.eduQuizAnswers[qi]===oi){
              bg='var(--gold-faint)';border='var(--gold-dim)';color='var(--gold-light)';
            }
            return`<div class="edu-quiz-opt" data-qi="${qi}" data-oi="${oi}" style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:6px;border:0.5px solid ${border};background:${bg};color:${color};cursor:${submitted?'default':'pointer'};margin-bottom:5px;font-size:12px;transition:all .1s">
              <div style="width:20px;height:20px;border-radius:50%;border:0.5px solid ${border};display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;font-weight:600">
                ${submitted&&oi===correct?'✓':submitted&&oi===S.eduQuizAnswers[qi]&&oi!==correct?'✗':String.fromCharCode(65+oi)}
              </div>
              ${opt}
            </div>`;
          }).join('')}
          ${submitted&&q.explanation?`<div style="margin-top:8px;font-size:11px;color:var(--cream-faint);font-style:italic;padding:8px 10px;background:rgba(212,168,76,.06);border-radius:4px;border-left:2px solid var(--gold-dim)">${q.explanation}</div>`:''}
        </div>`;
      }).join('')}

      <div style="display:flex;gap:10px;margin-top:6px">
        ${!submitted?`<button id="edu-submit-quiz-btn" data-path="${pathId}" data-topic="${topic.id}" class="btn-p" style="font-size:12px;padding:10px 20px" ${Object.keys(S.eduQuizAnswers).length<c.questions.length?'disabled':''}>Submit answers</button>`:''}
        ${submitted?`<button id="edu-retry-quiz-btn" class="btn-g" style="font-size:12px;padding:10px 14px">Retry quiz</button>`:''}
        ${submitted&&score>=60?`<button id="edu-next-topic-btn" data-path="${pathId}" data-topic="${topic.id}" class="btn-p" style="font-size:12px;padding:10px 20px">Next topic →</button>`:''}
      </div>
    </div>`;
}

function renderTravelTab(){
  // All unique regions in the collection with coord data
  const regionMap={};
  S.wines.forEach(w=>{
    const c=getRegionCoords(w.region);
    if(!regionMap[w.region]) regionMap[w.region]={region:w.region,wines:[],hasCoords:!!c,lat:c?c[0]:null,lng:c?c[1]:null};
    regionMap[w.region].wines.push(w);
  });
  const regions=Object.values(regionMap).sort((a,b)=>b.wines.length-a.wines.length);

  // Country flags lookup
  const flags={"France":"🇫🇷","Italy":"🇮🇹","Spain":"🇪🇸","USA":"🇺🇸","Australia":"🇦🇺","Argentina":"🇦🇷","Germany":"🇩🇪","Portugal":"🇵🇹","Chile":"🇨🇱"};
  function getFlag(region){
    if(!region) return "🌍";
    for(const[country,flag] of Object.entries(flags)){
      if(region.includes(country)) return flag;
    }
    return "🌍";
  }

  return`<div style="padding:22px">
    <!-- Header -->
    <div style="margin-bottom:22px">
      <div class="serif" style="font-size:28px;font-weight:300;color:var(--cream);margin-bottom:4px">${t("wineRegionTravel")}</div>
      <div style="font-size:13px;color:var(--cream-faint)">${t("planYourVisit")}</div>
    </div>

    <!-- Feature highlight cards -->
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:24px" class="travel-feature-grid">
      ${[["✈️",t("findFlights"),"Direct links to Google Flights, Kayak & airlines"],
         ["🏨",t("whereToStay"),"Curated hotel picks for every budget"],
         ["🍷","Winery Visit","Contact info, hours & booking tips"],
         ["🍽","Dining","Best restaurants near each estate"],
         ["🗺",t("gettingThere"),"Airport, train & local transport"],
         ["📸",t("experiences"),"Tastings, harvests & cellar tours"],
        ].map(([ic,t,d])=>`
        <div style="text-align:center;padding:10px 6px">
          <div style="font-size:22px;margin-bottom:4px">${ic}</div>
          <div style="font-size:11px;font-weight:600;color:var(--cream);margin-bottom:3px">${t}</div>
          <div style="font-size:10px;color:var(--cream-faint);line-height:1.5">${d}</div>
        </div>`).join("")}
    </div>

    <!-- Regions list -->
    <div style="font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--cream-faint);margin-bottom:14px">${regions.length} Regions in Your Collection</div>
    <div style="display:grid;gap:12px">
      ${regions.map(rc=>`
        <div style="background:rgba(24,10,16,.88);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:border-color .2s" onmouseover="this.style.borderColor='rgba(220,160,80,.5)'" onmouseout="this.style.borderColor='var(--border)'">
          <div style="padding:16px 20px;display:flex;align-items:center;gap:16px">
            <!-- Flag + region name -->
            <div style="font-size:32px;flex-shrink:0">${getFlag(rc.region)}</div>
            <div style="flex:1;min-width:0">
              <div style="font-size:14px;font-weight:600;color:var(--cream);margin-bottom:2px">${rc.region}</div>
              <div style="font-size:11px;color:var(--cream-faint)">${rc.wines.length} bottle${rc.wines.length>1?"s":""} · ${rc.wines.slice(0,3).map(w=>w.name.split(" ").slice(0,2).join(" ")).join(", ")}${rc.wines.length>3?` +${rc.wines.length-3} more`:""}</div>
            </div>
            <!-- Score badge -->
            <div style="text-align:center;flex-shrink:0;margin-right:6px">
              <div class="serif" style="font-size:22px;color:var(--gold)">${Math.round(rc.wines.reduce((a,w)=>a+w.rating,0)/rc.wines.length)}</div>
              <div style="font-size:9px;color:var(--cream-faint);letter-spacing:.06em">AVG</div>
            </div>
            <!-- Plan Visit button -->
            <button class="btn-p plan-visit-btn" data-region="${rc.region}" data-wine-id="${rc.wines[0].id}" style="font-size:11px;padding:10px 16px;white-space:nowrap;background:linear-gradient(135deg,rgba(100,140,220,.6),rgba(60,100,180,.6));border:1px solid rgba(100,140,220,.5)">
              ✈️ Plan Visit
            </button>
          </div>
          <!-- Wine mini-strip -->
          <div style="display:flex;gap:0;overflow:hidden;height:4px">
            ${rc.wines.map(w=>`<div style="flex:1;background:${w.bc};opacity:.8"></div>`).join("")}
          </div>
        </div>`).join("")}
    </div>
  </div>`;
}

let sommelierHistory = [];

async function askSommelier(question) {
  sommelierLoading = true;
  const userMsg = {role:"user", content:question};
  sommelierHistory.push(userMsg);
  render();

  try {
    const ln = LANGS.find(l=>l.code===S.lang)?.native||"English";
    const cellarSummary = S.wines.slice(0,20).map(w=>
      `${w.name} ${w.vintage} (${w.region}, ${w.rating}/100, ${w.mode})`
    ).join('\n');

    const systemPrompt = `You are a world-class master sommelier and personal wine advisor.
The user's wine collection (${S.wines.length} bottles):
${cellarSummary}
${S.wines.length>20?`...and ${S.wines.length-20} more bottles`:''}
Respond in ${ln}. Be specific, reference their actual wines when relevant. Keep answers concise (2-4 sentences) but expert.`;

    const _aiSommCtrl = new AbortController();
    const _aiSommTimeout = setTimeout(()=>_aiSommCtrl.abort(), 15000);
    const res = await fetch("/api/anthropic", {
      method:"POST",
      signal:_aiSommCtrl.signal,
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+(S.user&&S.user.token||"")},
      body:JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens:400,
        system:systemPrompt,
        messages:sommelierHistory
      })
    });
    clearTimeout(_aiSommTimeout);
    const data = await res.json();
    const reply = data.content?.[0]?.text || "I couldn't answer that right now.";
    sommelierHistory.push({role:"assistant", content:reply});
  } catch(e) {
    sommelierHistory.push({role:"assistant", content:"API error: " + e.message});
    console.error("Sommelier error:", e);
  }
  sommelierLoading = false;
  render();
}

async function calcDrinkingWindow(wine) {

    const text = await callAI(
      `Wine: "${wine.name}" ${wine.vintage}, ${wine.region}, ${(wine.grapes||[]).join(', ')}, rated ${wine.rating}/100.
Current year: ${year}. Language: ${ln}.
Return JSON: {
  "status": "Too Young|Approaching|Peak|Drinking Well|Past Peak",
  "peakStart": 2026,
  "peakEnd": 2034,
  "recommendOpen": "Specific advice on when to open",

function renderCellarTab(list, tab){
  const {cellarSearch:cs, cellarSort:sort, cellarDir:dir, cellarFilters:cf, cellarView:view} = S;

  // Build unique filter options from full list (cellar or consumed)
  const allWines = S.wines.filter(w=>w.mode===tab);
  const vintages = [...new Set(allWines.map(w=>w.vintage))].sort((a,b)=>b-a);
  const regions  = [...new Set(allWines.map(w=>w.region))].filter(Boolean).sort();
  const grapes   = [...new Set(allWines.flatMap(w=>w.grapes||[]))].filter(Boolean).sort();
  const types    = [...new Set(allWines.map(w=>{
    const g=(w.grapes||[]).join(' ').toLowerCase();
    if(g.includes('chardonnay')||g.includes('blanc')||g.includes('riesling')||g.includes('chenin')) return 'White';
    if(g.includes('rosé')||g.includes('rose')) return 'Rosé';
    if(g.includes('champagne')||g.includes('sparkling')||g.includes('cava')||g.includes('prosecco')) return 'Sparkling';
    if(g.includes('port')||g.includes('sherry')||g.includes('madeira')||g.includes('grenache noir')&&(w.region||'').includes('Maury')) return 'Fortified';
    return 'Red';
  }))].sort();

  // Determine wine type helper
  const getType = w => {
    const g=(w.grapes||[]).join(' ').toLowerCase();
    if(g.includes('chardonnay')||g.includes('blanc')||g.includes('riesling')||g.includes('chenin')) return 'White';
    if(g.includes('rosé')||g.includes('rose')) return 'Rosé';
    if(g.includes('champagne')||g.includes('sparkling')||g.includes('cava')||g.includes('prosecco')) return 'Sparkling';
    if(g.includes('port')||g.includes('sherry')||g.includes('madeira')||(g.includes('grenache')&&(w.region||'').includes('Maury'))) return 'Fortified';
    return 'Red';
  };

  // Apply filters
  let filtered = list.filter(w => {
    if(cs && !w.name.toLowerCase().includes(cs.toLowerCase()) &&
              !(w.region||'').toLowerCase().includes(cs.toLowerCase()) &&
              !(w.grapes||[]).join(' ').toLowerCase().includes(cs.toLowerCase())) return false;
    if(cf.vintage && String(w.vintage) !== cf.vintage) return false;
    if(cf.region  && !(w.region||'').includes(cf.region)) return false;
    if(cf.grape   && !(w.grapes||[]).some(g=>g.includes(cf.grape))) return false;
    if(cf.type    && getType(w) !== cf.type) return false;
    return true;
  });

  // Sort
  filtered.sort((a,b)=>{
    let va, vb;
    switch(sort){
      case 'vintage': va=a.vintage; vb=b.vintage; break;
      case 'rating':  va=a.rating;  vb=b.rating;  break;
      case 'region':  va=a.region;  vb=b.region;  break;
      case 'grape':   va=(a.grapes||[])[0]||''; vb=(b.grapes||[])[0]||''; break;
      case 'type':    va=getType(a); vb=getType(b); break;
      default:        va=a.name;    vb=b.name;
    }
    if(typeof va==='number') return dir==='asc'?va-vb:vb-va;
    return dir==='asc'?String(va).localeCompare(String(vb)):String(vb).localeCompare(String(va));
  });

  const activeFilters = Object.values(cf).filter(Boolean).length + (cs?1:0);

  const sortArrow = col => sort===col ? (dir==='asc'?'▲':'▼') : '⇅';

  // Type badge colour
  const typeBadge = type => {
    const c = {Red:'rgba(139,32,64,.6)',White:'rgba(180,160,60,.6)',Rosé:'rgba(200,100,120,.6)',Sparkling:'rgba(60,120,180,.6)',Fortified:'rgba(100,60,20,.6)'}[type]||'rgba(80,80,80,.5)';
    return `<span style="background:${c};border-radius:3px;padding:2px 7px;font-size:9px;letter-spacing:.08em;color:#fff;white-space:nowrap">${type}</span>`;
  };

  const ratingBar = r => {
    const w = Math.round(r/100*40);
    return `<div style="display:flex;align-items:center;gap:6px">
      <div style="width:40px;height:4px;background:rgba(255,255,255,.1);border-radius:2px">
        <div style="width:${w}px;height:4px;background:${r>=95?'#e8c060':r>=90?'#d4a84c':r>=85?'#c89040':'#a87030'};border-radius:2px"></div>
      </div>
      <span class="col-score">${r}</span>
    </div>`;
  };

  return `<div>
    <!-- Filter bar -->
    <div class="filter-bar" id="cellar-filter-bar">
      <!-- Search -->
      <input class="inp" id="cellar-search" placeholder="🔍 Search name, region, grape…" value="${cs}" style="min-width:180px;max-width:240px"/>

      <!-- Vintage -->
      <select class="inp" id="filter-vintage" style="max-width:110px">
        <option value="">All Vintages</option>
        ${vintages.map(v=>`<option value="${v}" ${cf.vintage==v?'selected':''}>${v}</option>`).join('')}
      </select>

      <!-- Type -->
      <select class="inp" id="filter-type" style="max-width:110px">
        <option value="">All Types</option>
        ${types.map(t=>`<option value="${t}" ${cf.type===t?'selected':''}>${t}</option>`).join('')}
      </select>

      <!-- Grape -->
      <select class="inp" id="filter-grape" style="max-width:140px">
        <option value="">All Grapes</option>
        ${grapes.map(g=>`<option value="${g}" ${cf.grape===g?'selected':''}>${g}</option>`).join('')}
      </select>

      <!-- Region -->
      <select class="inp" id="filter-region" style="max-width:200px">
        <option value="">All Regions</option>
        ${regions.map(r=>`<option value="${r}" ${cf.region===r?'selected':''}>${r}</option>`).join('')}
      </select>

      <!-- Clear filters -->
      ${activeFilters?`<button class="btn-danger" id="clear-filters" style="height:32px;padding:0 12px;font-size:10px">✕ Clear (${activeFilters})</button>`:''}

      <div style="flex:1"></div>

      <!-- Results count -->
      <span style="font-size:11px;color:var(--cream-faint);white-space:nowrap">${filtered.length} / ${list.length} bottles</span>

      <!-- View toggle -->
      <div class="view-toggle">
        <button class="${view==='table'?'active':''}" id="view-table" title="List view">☰</button>
        <button class="${view==='grid'?'active':''}" id="view-grid" title="Grid view">⊞</button>
      </div>
    </div>

    <!-- Compact list view: Name + Vintage only, 2 columns, scales to 1000s of wines -->
    ${view==='table'?`
    <div class="cellar-wrap">
      ${filtered.length===0?`<div style="padding:60px;text-align:center">
        <div class="serif" style="font-size:22px;color:var(--cream);margin-bottom:8px">No wines match your filters</div>
        <div style="font-size:13px;color:var(--cream-faint)">Try adjusting or clearing the filters above</div>
      </div>`:`
      <div class="compact-sort-bar" style="display:flex;gap:4px;padding:8px 14px;border-bottom:1px solid var(--border);font-size:10px;color:var(--cream-faint)">
        <span>Sort:</span>
        <span class="sort-pill ${sort==='name'?'active':''}" data-col="name">Name ${sortArrow('name')}</span>
        <span class="sort-pill ${sort==='vintage'?'active':''}" data-col="vintage">Vintage ${sortArrow('vintage')}</span>
        <span class="sort-pill ${sort==='rating'?'active':''}" data-col="rating">Score ${sortArrow('rating')}</span>
        <span class="sort-pill ${sort==='region'?'active':''}" data-col="region">Region ${sortArrow('region')}</span>
        <span class="sort-pill ${sort==='grape'?'active':''}" data-col="grape">Grape ${sortArrow('grape')}</span>
        <span class="sort-pill ${sort==='type'?'active':''}" data-col="type">Type ${sortArrow('type')}</span>
      </div>
      <div class="compact-wine-list" style="display:grid;grid-template-columns:repeat(2,1fr);gap:0">
        ${filtered.map((w,i)=>`
          <div class="compact-wine-row wine-row" data-id="${w.id}" style="display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer;${i%2===0?'border-right:1px solid rgba(255,255,255,.05)':''}">
            ${w.labelImg?`<img src="${w.labelImg}" style="width:16px;height:22px;object-fit:cover;border-radius:2px;flex-shrink:0;opacity:.85"/>`:
              `<div style="width:5px;height:22px;background:${w.bc};border-radius:2px;flex-shrink:0"></div>`}
            <span style="flex:1;min-width:0;font-size:13px;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${w.name}</span>
            <span style="font-size:12px;color:var(--cream-faint);flex-shrink:0">${w.vintage}</span>
            ${w.tradeable||w.notes?`<span style="flex-shrink:0;font-size:10px">${w.tradeable?'🔄':''}${w.notes?'📝':''}</span>`:''}
          </div>`).join('')}
      </div>`}
    </div>`:`
    <!-- Grid view (original cards) -->
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:14px;padding:16px" class="wine-grid">
      ${filtered.length
        ? filtered.map(renderWineCard).join('')
        : `<div style="grid-column:1/-1;padding:60px;text-align:center">
            <div class="serif" style="font-size:22px;color:var(--cream);margin-bottom:8px">No wines match</div>
          </div>`}
    </div>`}
  </div>`;
}


// ── Wine Valuation ─────────────────────────────────────────────
async function fetchValuation(wine){
  S.showValuation = wine;
  S.valuationData = null;
  S.valuationLoading = true;
  render();
  try{
    const inv = wine.inventory || [{ml:750,qty:1}];
    const totalEq = totalEquivBottles(inv);
    const text = await callAI(
      `Provide current market valuation for: "${wine.name}" ${wine.vintage}, ${wine.region}.
Grapes: ${(wine.grapes||[]).join(', ')}. Critics score: ${wine.rating}/100.
Return JSON: {
  "perBottle750": 220,
  "currency": "USD",
  "trend": "Appreciating|Stable|Declining",
  "trendPct": 8,
  "low": 180,
  "high": 280,
  "lastAuction": "Sothebys Nov 2024",
  "lastAuctionPrice": 240,
  "peakValue": "2028-2032",
  "notes": "1 sentence on value outlook"
}`,
      "You are a fine wine market analyst with deep knowledge of auction records and retail pricing. Return ONLY valid JSON."
    );
    const d = JSON.parse(text);
    // Compute totals for each inventory line
    d.inventory = inv.map(line => {
      const size = BOTTLE_SIZES.find(b=>b.ml===(line.ml||750));
      const eq = size ? size.eq : 1;
      const sizeMultiplier = eq; // larger formats command premium
      const premium = eq >= 8 ? 1.35 : eq >= 4 ? 1.2 : eq >= 2 ? 1.1 : eq < 1 ? 0.85 : 1;
      const perUnit = Math.round(d.perBottle750 * eq * premium);
      return {
        ...line,
        sizeName: size ? size.name : 'Standard Bottle',
        equiv: size ? size.equiv : '1 bottle',
        perUnit,
        lineTotal: perUnit * (line.qty||1),
      };
    });
    d.grandTotal = d.inventory.reduce((s,l)=>s+l.lineTotal,0);
    S.valuationData = d;
  } catch(e){ S.valuationData={error:true}; }
  S.valuationLoading = false;
  render();
}

// ── QR Code Scanner ────────────────────────────────────────────
let _qrStream = null;
let _qrAnimFrame = null;

function openQRScanner(){
  // Show the explainer/permission screen first — requesting camera access
  // with no context up front leads to far more denials.
  S.showQRScanner = true;
  S.qrScanError = "";
  S.qrScanStage = "intro";  // "intro" | "requesting" | "scanning" | "error"
  render();
}

async function startQRCamera(){
  S.qrScanStage = "requesting";
  S.qrScanError = "";
  render();

  // HTTPS (or localhost) is required for camera access in every browser.
  const isSecure = window.isSecureContext || location.hostname === "localhost" || location.hostname === "127.0.0.1";
  if(!isSecure){
    S.qrScanStage = "error";
    S.qrScanError = "secure-context";
    render();
    return;
  }

  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    S.qrScanStage = "error";
    S.qrScanError = "unsupported";
    render();
    return;
  }

  // Load jsQR from CDN on first use only
  if(!window.jsQR){
    try{
      await new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = "https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js";
        script.onload = resolve;
        script.onerror = reject;
        document.head.appendChild(script);
      });
    } catch(e){
      S.qrScanStage = "error";
      S.qrScanError = "load-failed";
      render();
      return;
    }
  }

  try{
    _qrStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }  // Rear camera on phones
    });
    S.qrScanStage = "scanning";
    render();
    // Wait a tick for the video element to exist in the DOM after render
    setTimeout(async ()=>{
      const video = document.getElementById("qr-video");
      if(!video){ closeQRScanner(); return; }
      video.srcObject = _qrStream;
      await video.play();
      scanQRFrame(video);
    }, 50);
  } catch(e){
    S.qrScanStage = "error";
    // NotAllowedError = user/browser blocked permission. NotFoundError = no camera device.
    if(e.name === "NotAllowedError")     S.qrScanError = "denied";
    else if(e.name === "NotFoundError")  S.qrScanError = "no-camera";
    else                                  S.qrScanError = "unknown";
    render();
  }
}

function scanQRFrame(video){
  if(!S.showQRScanner || S.qrScanStage !== "scanning") return;  // Stopped — don't keep scanning
  const canvas = document.getElementById("qr-canvas");
  if(!canvas || video.readyState !== video.HAVE_ENOUGH_DATA){

    _qrAnimFrame = requestAnimationFrame(()=>scanQRFrame(video));
    return;
  }
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const code = window.jsQR ? window.jsQR(imageData.data, imageData.width, imageData.height) : null;

  if(code && code.data){
    handleQRResult(code.data);
    return;  // Stop scanning loop — handled below
  }
  _qrAnimFrame = requestAnimationFrame(()=>scanQRFrame(video));
}

function handleQRResult(data){
  closeQRScanner();
  // Expected format: https://yourdomain.com/join?v=VENUE_ID  (or any URL containing ?v=)
  let venueId = null;
  try{
    const url = new URL(data);
    venueId = url.searchParams.get("v");
  } catch(e){
    // Not a full URL — check if it's just a bare venue ID or a query string fragment
    const m = data.match(/[?&]v=([^&]+)/);
    if(m) venueId = decodeURIComponent(m[1]);
  }

  if(!venueId){
    alert("That QR code isn't a CellarTrek venue code.");
    return;
  }
  fetchVenueProfile(venueId, true);
}

function closeQRScanner(){
  S.showQRScanner = false;
  S.qrScanStage = "intro";
  if(_qrAnimFrame){ cancelAnimationFrame(_qrAnimFrame); _qrAnimFrame = null; }
  if(_qrStream){ _qrStream.getTracks().forEach(t=>t.stop()); _qrStream = null; }
  render();
}

// Per-browser instructions for re-enabling camera access after it's been blocked.
// Detected from the user agent so we can show the exact menu path, not a generic message.
function getCameraPermissionInstructions(){
  const ua = navigator.userAgent;
  const isIOS = /iPhone|iPad|iPod/.test(ua);
  const isSafari = /^((?!chrome|android).)*safari/i.test(ua);
  const isChrome = /Chrome/.test(ua) && !/Edg/.test(ua);
  const isFirefox = /Firefox/.test(ua);

  if(isIOS && isSafari){
    return ["Open the Settings app", "Scroll down and tap Safari", "Tap Camera", "Select \"Allow\""];
  }
  if(isIOS){ // Chrome/other browsers on iOS use the Safari-level system permission
    return ["Open the Settings app", "Find this browser app in the list", "Tap it, then tap Camera", "Turn Camera on"];
  }
  if(isChrome){
    return ["Tap the lock or info icon (ⓘ) in the address bar", "Tap Permissions or Site settings", "Set Camera to \"Allow\"", "Reload the page"];
  }
  if(isFirefox){
    return ["Tap the lock icon in the address bar", "Tap Connection secure → More information", "Go to Permissions and allow Camera"];
  }
  return ["Open your browser's site settings for this page", "Find Camera and set it to \"Allow\"", "Reload the page"];
}

async function fetchVenueProfile(venueId, fromQR=false){
  S.venueLoading = true;
  render();
  try{
    const res = await fetch(`/api/venue/${venueId}`);
    if(!res.ok) throw new Error('Venue not found');
    const venue = await res.json();
    // Check if already joined
    const already = S.joinedVenues.find(v=>v.id===venueId);
    if(!already){
      if(fromQR){
        // Show welcome modal
        S.venueWelcome = venue;
      } else {
        // Direct join without welcome
        joinVenue(venue);
      }
    } else {
      // Already a member — show venue detail
      S.activeVenue = venue;
      S.tab = "venues";
    }
  } catch(e){
    alert("Could not find that venue. Please try again.");
  }
  S.venueLoading = false;
  render();
}

function joinVenue(venue){
  // Add to joined venues
  if(!S.joinedVenues.find(v=>v.id===venue.id)){
    S.joinedVenues.push({
      id:              venue.id,
      name:            venue.name,
      logoUrl:         venue.logoUrl||null,
      joinedAt:        new Date().toISOString().split("T")[0],
      isSelectReviewer:false,
      address:         venue.address||"",
      ctaLabel:        venue.ctaLabel||null,
      ctaUrl:          venue.ctaUrl||null,
    });
  }
  // Add venue wines to cellar (tagged)
  if(venue.wines && venue.wines.length){
    const existing = new Set(S.wines.map(w=>w.id));
    venue.wines.forEach(w=>{
      if(!existing.has(w.id)){
        S.wines.push({...w, venueId:venue.id, venueName:venue.name, source:"venue"});
      }
    });
  }
  S.venueWelcome = null;
  S.activeVenue  = venue;
  S.tab = "venues";
  S.notifications += 1;
  // Record membership on the server so the venue's admin panel sees this member.
  // Requires the user to be logged in — anonymous/demo users join locally only.
  if(S.user){
    apiRequest("/api/venue/"+venue.id+"/member/join", { method:"POST" })
      .catch(e=>console.error("Could not record venue membership on server:", e.message));
  }
}

async function fetchVenueFeed(venueId){
  S.venueFeedLoading = true;
  render();
  try{
    const res = await fetch(`/api/venue/${venueId}/feed`);
    if(res.ok) S.venueFeed = await res.json();
  } catch(e){ S.venueFeed = []; }
  S.venueFeedLoading = false;
  render();
}

async function doSignup(email, password, name){
  S.authError = ""; S.authLoading = true; render();
  try{
    const res = await fetch("/api/auth/signup", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ email, password, name, lang: S.lang })
    });
    const data = await res.json();
    if(!res.ok){ S.authError = data.error || "Could not create account."; S.authLoading=false; render(); return; }
    S.user = { ...data.user, token: data.token };
    persistSession(S.user);
    S.authLoading = false;
    S.screen = "dashboard";
    await loadWinesFromServer();
    loadEduProgress();
    render();
  } catch(e){
    S.authError = "Network error. Please try again.";
    S.authLoading = false; render();
  }
}

  S.authError = ""; S.authLoading = true; render();
  try{
    const res = await fetch("/api/auth/login", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if(!res.ok){ S.authError = data.error || "Invalid email or password."; S.authLoading=false; render(); return; }
    S.user = { ...data.user, token: data.token };
    persistSession(S.user);

  }
}

async function doForgotPassword(email){
  S.authError = ""; S.forgotResetUrl = ""; S.authLoading = true; render();

const SESSION_STORAGE_AVAILABLE = (() => {
  try {
    const k = "__ct_storage_test__";
    localStorage.setItem(k, "1");
    localStorage.removeItem(k);
    return true;
  } catch(e) {
    return false;
  }
})();

function persistSession(user){
  if(!SESSION_STORAGE_AVAILABLE || !user || !user.token) return;
  try{
    localStorage.setItem("ct_user_token", user.token);
    const { token, ...userInfo } = user;
    localStorage.setItem("ct_user_info", JSON.stringify(userInfo));
  } catch(e){
    console.warn("Session persistence unavailable:", e.message);
  }
}

function clearPersistedSession(){
  if(!SESSION_STORAGE_AVAILABLE) return;
  try{
    localStorage.removeItem("ct_user_token");
    localStorage.removeItem("ct_user_info");
  } catch(e){
    console.warn("Session clearing unavailable:", e.message);
  }
}

function persistUserProfile(){
  if(!SESSION_STORAGE_AVAILABLE || !S.user) return;
  persistSession(S.user);
}

function tryRestoreSession(){
  if(!SESSION_STORAGE_AVAILABLE) return false;
  try{
    const token = localStorage.getItem("ct_user_token");
    const info  = localStorage.getItem("ct_user_info");
    if(token && info){
      S.user = { ...JSON.parse(info), token };
      return true;
    }
  } catch(e){
    console.warn("Session restore unavailable:", e.message);
  }
  return false;
}


async function apiRequest(path, opts={}){
  if(!S.user || !S.user.token) throw new Error("Not authenticated");
  const res = await fetch(path, {
    ...opts,
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+S.user.token,
      ...(opts.headers||{}),
    }
  });
  if(res.status===401){ doLogout(); throw new Error("Session expired"); }
  const data = await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(data.error||"Request failed");
  return data;
}

async function loadWinesFromServer(){
  if(!S.user) return;
  S.winesLoading = true; render();
  try{
    const wines = await apiRequest("/api/wines");
    S.wines = wines.map(w => ({
      id: w.id, name: w.name, vintage: w.vintage, region: w.region,
      grapes: w.grapes||[], mode: w.mode, rating: w.rating, notes: w.notes,
      story: w.story, aromas: w.aromas||[], flavors: w.flavors||[],
      body: w.body, finish: w.finish, occasion: w.occasion,
      bc: w.bc, lc: w.lc, tradeable: w.tradeable,
      labelImg: w.label_img, articles: w.articles||[],
      inventory: w.inventory||[{ml:750,qty:1}],
      venueId: w.venue_id, venueName: w.venue_name || w.venueName || null, source: w.source,
      purchaseType: w.purchase_type, pricePaid: w.price_paid!=null?parseFloat(w.price_paid):null,
      priceMl: w.price_ml, priceCurrency: w.price_currency,
    }));
    S.winesSynced = true;
  } catch(e){
    console.error("Could not load wines from server:", e.message);
  }
  S.winesLoading = false; render();
}

async function syncWineToServer(wine){
  if(!S.user) return null;
  try{
    const result = await apiRequest("/api/wines", {
      method:"POST",
      body: JSON.stringify({
        name: wine.name, vintage: wine.vintage, region: wine.region,
        grapes: wine.grapes, mode: wine.mode, rating: wine.rating,
        notes: wine.notes, story: wine.story, aromas: wine.aromas,
        flavors: wine.flavors, body: wine.body, finish: wine.finish,
        occasion: wine.occasion, bc: wine.bc, lc: wine.lc,
        tradeable: wine.tradeable, ai_enriched: !!wine.story,
        articles: wine.articles, labelImg: wine.labelImg,
        inventory: wine.inventory || [{ml:750,qty:1}], venueId: wine.venueId, source: wine.source,
        purchaseType: wine.purchaseType, pricePaid: wine.pricePaid,
        priceMl: wine.priceMl, priceCurrency: wine.priceCurrency,
      })
    });
    return result.id;
  } catch(e){
    console.error("Could not sync wine to server:", e.message);
    return null;
  }
}

function applyPersonalTheme(){
  const mode   = S.showAccount ? (S.accountDraft.themeMode  || "dark")
                                : (S.user?.theme_mode        || "dark");
  const accent = S.showAccount ? (S.accountDraft.themeAccent || null)
                                : (S.user?.theme_accent       || null);

  // Apply to <html> for CSS selectors to work
  document.documentElement.className = mode === "light" ? "theme-light" : "theme-dark";

  // Also directly manipulate the <style id="personal-theme-styles"> block
  // with !important overrides — this wins over everything else including
  // inline styles and other stylesheets.
  let st = document.getElementById('personal-theme-styles');
  if(!st){
    st = document.createElement('style');
    st.id = 'personal-theme-styles';
    document.head.appendChild(st);
  }

  if(mode === "light"){
    const a = accent || null;
    st.textContent = `
      .navbar-inner { background: rgba(245,237,224,.97) !important; border-bottom-color: rgba(139,34,64,.25) !important; }
      .stats-bar { background: rgba(245,237,224,.88) !important; }
      .bottom-nav { background: rgba(245,237,224,.97) !important; }
      .bottom-nav-item { color: #6a3040 !important; }
      .bottom-nav-item.active { color: #8b2240 !important; }
      ${a ? `:root{--gold:${a} !important;--gold-dim:${a}80 !important;--gold-faint:${a}22 !important;}` : ""}
    `;
  } else {
    const a = accent || null;
    st.textContent = a ? `:root{--gold:${a} !important;--gold-dim:${a}80 !important;--gold-faint:${a}22 !important;}` : "";
  }
}
