<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CellarTrek — Reset Password</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--wine:#8b2240;--gold:#d4a84c;--cream:#f5ede0;--bg:#2a1520;--bg-card:rgba(50,20,28,.95);--border:rgba(220,160,80,.25);--sans:'Montserrat',system-ui,sans-serif;--serif:'Cormorant Garamond',Georgia,serif;}
body{font-family:var(--sans);background:var(--bg);color:var(--cream);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;width:100%;max-width:420px;padding:36px}
.logo{font-family:var(--serif);font-size:26px;margin-bottom:20px;text-align:center}<br>
.logo span{color:var(--gold)}
h2{font-family:var(--serif);font-size:22px;font-weight:300;margin-bottom:8px;color:var(--cream)}
p{font-size:13px;color:rgba(245,237,224,.65);line-height:1.7;margin-bottom:20px}
label{display:block;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
input{width:100%;background:rgba(255,255,255,.08);border:1px solid var(--border);color:var(--cream);padding:12px 14px;font-size:13px;border-radius:5px;outline:none;font-family:var(--sans);margin-bottom:14px}
input:focus{border-color:var(--gold)}
button{width:100%;padding:14px;background:var(--wine);color:var(--cream);border:none;border-radius:5px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:background .2s}
button:hover{background:#a82850}
button:disabled{opacity:.6;cursor:not-allowed}
.error{background:rgba(184,32,64,.15);border:1px solid rgba(184,32,64,.4);border-radius:5px;padding:12px;font-size:12px;color:#e8a0a0;margin-bottom:14px;display:none}
.success{text-align:center;padding:20px 0;display:none}
.success svg{margin:0 auto 16px;display:block}
.back{display:block;text-align:center;margin-top:18px;font-size:12px;color:rgba(245,237,224,.45);text-decoration:none}
.back:hover{color:var(--gold)}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><span>Cellar</span>Trek</div>

  <div id="form-view">
    <h2>Reset your password</h2>
    <p>Enter your new password below. This link expires after 1 hour.</p>
    <div id="error" class="error"></div>
    <div>
      <label>New Password</label>
      <input type="password" id="password" placeholder="Min. 8 characters"/>
    </div>
    <div>
      <label>Confirm Password</label>
      <input type="password" id="confirm" placeholder="Repeat new password"/>
    </div>
    <button id="submit-btn" onclick="doReset()">Set New Password</button>
    <a href="/" class="back">← Back to CellarTrek</a>
  </div>

  <div id="success-view" class="success">
    <svg width="60" height="60" viewBox="0 0 60 60">
      <circle cx="30" cy="30" r="28" fill="rgba(184,32,64,.2)" stroke="#b82040" stroke-width="2"/>
      <path d="M18 30l9 9 15-17" stroke="#d4a84c" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <h2>Password updated</h2>
    <p style="margin-bottom:20px">Your password has been changed successfully.</p>
    <button onclick="window.location.href='/'">Return to CellarTrek</button>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const token  = params.get('token');
const type   = params.get('type') || 'user'; // 'user' | 'venue'

if (!token) {
  document.getElementById('error').textContent = 'Invalid or missing reset link. Please request a new one.';
  document.getElementById('error').style.display = 'block';
  document.getElementById('submit-btn').disabled = true;
}

async function doReset() {
  const errorEl  = document.getElementById('error');
  const btn      = document.getElementById('submit-btn');
  const password = document.getElementById('password').value;
  const confirm  = document.getElementById('confirm').value;

  errorEl.style.display = 'none';

  if (password.length < 8) {
    errorEl.textContent = 'Password must be at least 8 characters.';
    errorEl.style.display = 'block'; return;
  }
  if (password !== confirm) {
    errorEl.textContent = 'Passwords do not match.';
    errorEl.style.display = 'block'; return;
  }

  btn.disabled = true; btn.textContent = 'Updating…';

  try {
    const endpoint = type === 'venue' ? '/api/venue-admin/reset-password' : '/api/reset-password';
    const res = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password })
    });
    const data = await res.json();
    if (!res.ok) {
      errorEl.textContent = data.error || 'Reset failed. The link may have expired.';
      errorEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Set New Password';
      return;
    }
    document.getElementById('form-view').style.display   = 'none';
    document.getElementById('success-view').style.display = 'block';
  } catch(e) {
    errorEl.textContent = 'Network error. Please try again.';
    errorEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Set New Password';
  }
}
</script>
</body>
</html>
